version: 1
name: identrail-reviewer
mode: shadow

thresholds:
  confidence:
    p0_min: 0.95
    p1_min: 0.90
    p2_min: 0.82
    p3_min: 0.75
  abstain_below: 0.80

policies:
  require_evidence: true
  require_fix_hint: true
  allow_low_confidence_comment: false

required_finding_fields:
  - id
  - severity
  - confidence
  - rule_id
  - summary
  - rationale
  - file
  - line
  - recommendation

routing:
  areas:
    api:
      - "cmd/server/**"
      - "internal/api/**"
      - "internal/service/**"
    worker:
      - "cmd/worker/**"
      - "internal/worker/**"
    cli:
      - "cmd/cli/**"
    ui:
      - "web/**"
    infra:
      - "deploy/**"
      - ".github/workflows/**"
    security:
      - "SECURITY.md"
      - "docs/security-hardening.md"

dataset:
  benchmark_path: data/identrail-reviewer/benchmark
  replay_min_samples: 50

slo:
  review_latency_p95_seconds: 90
  high_severity_precision_min: 0.95
  false_positive_rate_max: 0.08
