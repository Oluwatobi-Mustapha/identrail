name: Gitleaks

on:
  pull_request:
  push:
    branches:
      - dev
  workflow_dispatch:

permissions:
  contents: read

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0

      - name: Install gitleaks OSS CLI
        run: |
          set -euo pipefail
          VERSION="8.24.2"
          TARBALL="gitleaks_${VERSION}_linux_x64.tar.gz"
          TARBALL_SHA256="fa0500f6b7e41d28791ebc680f5dd9899cd42b58629218a5f041efa899151a8e"
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${VERSION}/${TARBALL}" -o "${RUNNER_TEMP}/${TARBALL}"
          echo "${TARBALL_SHA256}  ${RUNNER_TEMP}/${TARBALL}" | sha256sum -c -
          mkdir -p "${RUNNER_TEMP}/bin"
          tar -xzf "${RUNNER_TEMP}/${TARBALL}" -C "${RUNNER_TEMP}/bin" gitleaks
          echo "${RUNNER_TEMP}/bin" >> "${GITHUB_PATH}"
          "${RUNNER_TEMP}/bin/gitleaks" version

      - name: Run gitleaks (pull request commit range)
        if: github.event_name == 'pull_request'
        run: |
          set -euo pipefail
          BASE_SHA="${{ github.event.pull_request.base.sha }}"
          HEAD_SHA="${{ github.event.pull_request.head.sha }}"
          gitleaks git . --redact --verbose --log-opts "${BASE_SHA}..${HEAD_SHA}"

      - name: Run gitleaks (push commit range)
        if: github.event_name == 'push'
        run: |
          set -euo pipefail
          BEFORE_SHA="${{ github.event.before }}"
          CURRENT_SHA="${{ github.sha }}"
          if [[ "${BEFORE_SHA}" == "0000000000000000000000000000000000000000" ]]; then
            gitleaks dir . --redact --verbose
          else
            gitleaks git . --redact --verbose --log-opts "${BEFORE_SHA}..${CURRENT_SHA}"
          fi

      - name: Run gitleaks (manual full tree)
        if: github.event_name == 'workflow_dispatch'
        run: |
          set -euo pipefail
          gitleaks dir . --redact --verbose
