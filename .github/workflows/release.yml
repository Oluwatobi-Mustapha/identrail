name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing git tag to release (for example v1.2.3)"
        required: true
        type: string
      publish_images:
        description: "Publish container images (true/false). Push-tag releases always publish images."
        required: false
        type: boolean
        default: false

permissions:
  contents: write
  packages: write

jobs:
  prepare:
    name: Prepare Release Context
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.meta.outputs.tag }}
      prerelease: ${{ steps.meta.outputs.prerelease }}
      publish_latest: ${{ steps.meta.outputs.publish_latest }}
      publish_images: ${{ steps.meta.outputs.publish_images }}

    steps:
      - name: Resolve release metadata
        id: meta
        shell: bash
        run: |
          set -euo pipefail

          if [ "${GITHUB_EVENT_NAME}" = "push" ]; then
            tag="${GITHUB_REF_NAME}"
          else
            tag="${{ github.event.inputs.tag }}"
          fi

          if ! [[ "${tag}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?(\+[0-9A-Za-z.-]+)?$ ]]; then
            echo "Invalid release tag: ${tag}" >&2
            exit 1
          fi

          prerelease="false"
          publish_latest="true"
          publish_images="true"
          tag_without_build="${tag%%+*}"
          if [[ "${tag_without_build}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+- ]]; then
            prerelease="true"
            publish_latest="false"
          fi

          if [ "${GITHUB_EVENT_NAME}" != "push" ] && [ "${{ github.event.inputs.publish_images }}" != "true" ]; then
            publish_images="false"
          fi

          echo "tag=${tag}" >> "${GITHUB_OUTPUT}"
          echo "prerelease=${prerelease}" >> "${GITHUB_OUTPUT}"
          echo "publish_latest=${publish_latest}" >> "${GITHUB_OUTPUT}"
          echo "publish_images=${publish_images}" >> "${GITHUB_OUTPUT}"

  release-qualification:
    name: Release Qualification
    needs: prepare
    runs-on: ubuntu-latest
    permissions:
      contents: read
    timeout-minutes: 40
    env:
      CI_POSTGRES_PASSWORD: release-pg-${{ github.run_id }}-${{ github.run_attempt }}
      IDENTRAIL_INTEGRATION_DATABASE_URL: postgres://identrail:release-pg-${{ github.run_id }}-${{ github.run_attempt }}@127.0.0.1:5432/identrail?sslmode=disable
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: identrail
          POSTGRES_PASSWORD: ${{ env.CI_POSTGRES_PASSWORD }}
          POSTGRES_DB: identrail
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U identrail -d identrail"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          ref: refs/tags/${{ needs.prepare.outputs.tag }}

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c
        with:
          go-version-file: go.mod
          cache: true

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Setup Helm
        uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@5e8dbf3c6d9deaf4193ca7a8fb23f2ac83bb6c85

      - name: Run V1 release qualification
        run: ./scripts/v1_release_qualify.sh

  build-binaries:
    name: Build Release Binaries
    needs: [prepare, release-qualification]
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          ref: refs/tags/${{ needs.prepare.outputs.tag }}

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c
        with:
          go-version-file: go.mod
          cache: true

      - name: Build archives and checksums
        shell: bash
        run: |
          set -euo pipefail
          tag="${{ needs.prepare.outputs.tag }}"
          mkdir -p dist

          targets=(
            "linux/amd64"
            "linux/arm64"
            "darwin/amd64"
            "darwin/arm64"
            "windows/amd64"
          )

          commands=("cli" "server" "worker")

          for target in "${targets[@]}"; do
            goos="${target%/*}"
            goarch="${target#*/}"

            for cmd in "${commands[@]}"; do
              ext=""
              if [ "${goos}" = "windows" ]; then
                ext=".exe"
              fi

              bin_name="identrail-${cmd}-${tag}-${goos}-${goarch}${ext}"
              out_path="dist/${bin_name}"

              CGO_ENABLED=0 GOOS="${goos}" GOARCH="${goarch}" \
                go build -trimpath -ldflags="-s -w" -o "${out_path}" "./cmd/${cmd}"

              if [ "${goos}" = "windows" ]; then
                archive="dist/identrail-${cmd}-${tag}-${goos}-${goarch}.zip"
                zip -j "${archive}" "${out_path}" >/dev/null
              else
                archive="dist/identrail-${cmd}-${tag}-${goos}-${goarch}.tar.gz"
                tar -czf "${archive}" -C dist "${bin_name}"
              fi

              rm -f "${out_path}"
            done
          done

          (
            cd dist
            shasum -a 256 *.tar.gz *.zip > checksums.txt
          )

      - name: Upload release binaries
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: release-binaries
          path: dist/*
          if-no-files-found: error

  publish-images:
    name: Build and Publish Images
    needs: [prepare, release-qualification]
    if: needs.prepare.outputs.publish_images == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          ref: refs/tags/${{ needs.prepare.outputs.tag }}

      - name: Setup QEMU
        uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd

      - name: Login to GHCR
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push images
        shell: bash
        run: |
          set -euo pipefail

          owner="$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')"
          base="ghcr.io/${owner}/identrail"
          tag="${{ needs.prepare.outputs.tag }}"
          publish_latest="${{ needs.prepare.outputs.publish_latest }}"
          source_url="${{ github.server_url }}/${{ github.repository }}"
          revision="$(git rev-parse HEAD)"
          release_web_env="deploy/docker/release-web.env"
          web_api_url_source="${release_web_env}"
          web_feature_connector_aws="false"
          web_feature_connector_k8s="false"
          backend_platforms="linux/amd64,linux/arm64"

          if [ ! -f "${release_web_env}" ]; then
            if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
              echo "Missing ${release_web_env} on ${tag}; using legacy release web API URL for manual backfill." >&2
              web_api_url="https://api.identrail.io"
              web_api_url_source="legacy-workflow-default"
            else
              echo "Missing ${release_web_env}; release web image configuration must be versioned with the tag." >&2
              exit 1
            fi
          else
            web_api_url="$(
              awk -F= '$1 == "VITE_IDENTRAIL_API_URL" {print substr($0, index($0, "=") + 1)}' "${release_web_env}" \
                | tail -n1
            )"
            web_feature_connector_aws="$(
              awk -F= '$1 == "VITE_FEATURE_CONNECTOR_AWS" {print substr($0, index($0, "=") + 1)}' "${release_web_env}" \
                | tail -n1
            )"
            web_feature_connector_k8s="$(
              awk -F= '$1 == "VITE_FEATURE_CONNECTOR_K8S" {print substr($0, index($0, "=") + 1)}' "${release_web_env}" \
                | tail -n1
            )"
          fi

          if [ -z "${web_api_url}" ]; then
            echo "${release_web_env} must define VITE_IDENTRAIL_API_URL." >&2
            exit 1
          fi
          web_feature_connector_aws="${web_feature_connector_aws:-false}"
          web_feature_connector_k8s="${web_feature_connector_k8s:-false}"

          if [[ ! "${web_api_url}" =~ ^https:// ]]; then
            echo "VITE_IDENTRAIL_API_URL must start with https:// for release images: ${web_api_url}" >&2
            exit 1
          fi
          for flag in \
            VITE_FEATURE_CONNECTOR_AWS="${web_feature_connector_aws}" \
            VITE_FEATURE_CONNECTOR_K8S="${web_feature_connector_k8s}"; do
            if [[ ! "${flag}" =~ ^[A-Z0-9_]+=(true|false)$ ]]; then
              echo "${flag%%=*} must be true or false in ${release_web_env}; got ${flag#*=}." >&2
              exit 1
            fi
          done

          if ! grep -Eq '^ARG[[:space:]]+TARGETARCH([[:space:]=]|$)' deploy/docker/Dockerfile.backend; then
            echo "deploy/docker/Dockerfile.backend does not support TARGETARCH; publishing backend images for linux/amd64 only." >&2
            backend_platforms="linux/amd64"
          fi

          mkdir -p dist
          {
            printf 'VITE_IDENTRAIL_API_URL=%s\n' "${web_api_url}"
            printf 'VITE_FEATURE_CONNECTOR_AWS=%s\n' "${web_feature_connector_aws}"
            printf 'VITE_FEATURE_CONNECTOR_K8S=%s\n' "${web_feature_connector_k8s}"
            printf 'VITE_IDENTRAIL_API_URL_SOURCE=%s\n' "${web_api_url_source}"
          } > dist/release-web-build.txt

          build_and_push() {
            local name="$1"
            local title="$2"
            local platforms="$3"
            shift
            shift
            shift
            local image="${base}-${name}"
            local args=("$@")

            local tags=("-t" "${image}:${tag}")
            if [ "${publish_latest}" = "true" ]; then
              tags+=("-t" "${image}:latest")
            fi

            docker buildx build \
              --platform "${platforms}" \
              --push \
              --label "org.opencontainers.image.source=${source_url}" \
              --label "org.opencontainers.image.revision=${revision}" \
              --label "org.opencontainers.image.licenses=Apache-2.0" \
              --label "org.opencontainers.image.vendor=Identrail" \
              --label "org.opencontainers.image.title=${title}" \
              "${tags[@]}" \
              "${args[@]}"

            digest="$(docker buildx imagetools inspect "${image}:${tag}" --format '{{json .Manifest.Digest}}' | tr -d '"')"
            printf '%s\n' "${image}:${tag}@${digest}" >> dist/image-digests.txt
          }

          build_server() {
            local tags=("-t" "${base}:${tag}" "-t" "${base}-api:${tag}")
            if [ "${publish_latest}" = "true" ]; then
              tags+=("-t" "${base}:latest" "-t" "${base}-api:latest")
            fi

            docker buildx build \
              --platform "${backend_platforms}" \
              --push \
              --label "org.opencontainers.image.source=${source_url}" \
              --label "org.opencontainers.image.revision=${revision}" \
              --label "org.opencontainers.image.licenses=Apache-2.0" \
              --label "org.opencontainers.image.vendor=Identrail" \
              --label "org.opencontainers.image.title=Identrail" \
              --label "org.opencontainers.image.description=Identrail API server and machine identity engine" \
              "${tags[@]}" \
              -f deploy/docker/Dockerfile.backend \
              --build-arg TARGET=server \
              .

            for image in "${base}" "${base}-api"; do
              digest="$(docker buildx imagetools inspect "${image}:${tag}" --format '{{json .Manifest.Digest}}' | tr -d '"')"
              printf '%s\n' "${image}:${tag}@${digest}" >> dist/image-digests.txt
            done
          }

          build_server
          build_and_push "worker" "Identrail Worker" "${backend_platforms}" -f deploy/docker/Dockerfile.backend --build-arg TARGET=worker .
          build_and_push "agent" "Identrail Agent" "${backend_platforms}" -f deploy/docker/Dockerfile.backend --build-arg TARGET=identrail-agent .
          build_and_push "web" "Identrail Web" "linux/amd64,linux/arm64" \
            -f deploy/docker/Dockerfile.web \
            --build-arg "VITE_IDENTRAIL_API_URL=${web_api_url}" \
            --build-arg "VITE_FEATURE_CONNECTOR_AWS=${web_feature_connector_aws}" \
            --build-arg "VITE_FEATURE_CONNECTOR_K8S=${web_feature_connector_k8s}" \
            .

      - name: Upload image metadata
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: release-image-metadata
          path: |
            dist/image-digests.txt
            dist/release-web-build.txt
          if-no-files-found: error

  publish-release:
    name: Publish GitHub Release
    needs: [prepare, build-binaries]
    if: needs.prepare.outputs.publish_images != 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Download release binaries
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: release-binaries
          path: dist

      - name: Publish release with generated notes
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda
        with:
          tag_name: ${{ needs.prepare.outputs.tag }}
          generate_release_notes: true
          prerelease: ${{ needs.prepare.outputs.prerelease == 'true' }}
          files: |
            dist/*

  publish-release-with-images:
    name: Publish GitHub Release (With Images)
    needs: [prepare, build-binaries, publish-images]
    if: needs.prepare.outputs.publish_images == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Download release binaries
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: release-binaries
          path: dist

      - name: Download image metadata
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: release-image-metadata
          path: dist

      - name: Publish release with generated notes
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda
        with:
          tag_name: ${{ needs.prepare.outputs.tag }}
          generate_release_notes: true
          prerelease: ${{ needs.prepare.outputs.prerelease == 'true' }}
          files: |
            dist/*
