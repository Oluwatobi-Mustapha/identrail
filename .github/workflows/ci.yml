name: CI

on:
  pull_request:
    branches: ["main"]
  push:
    branches: ["main"]

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  go-quality:
    name: Go Quality
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Download Go Modules
        run: go mod download

      - name: Enforce gofmt
        shell: bash
        run: |
          set -euo pipefail
          if ! git ls-files '*.go' | grep -q .; then
            exit 0
          fi
          unformatted="$(git ls-files '*.go' | xargs gofmt -l)"
          if [ -n "${unformatted}" ]; then
            echo "The following files are not gofmt-formatted:"
            echo "${unformatted}"
            exit 1
          fi

      - name: Go Vet
        run: go vet ./...

  go-test:
    name: Go Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: go-quality
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run Unit and Package Tests
        run: go test ./... -coverprofile=coverage.out

      - name: Enforce Coverage Threshold
        shell: bash
        run: |
          set -euo pipefail
          total="$(go tool cover -func=coverage.out | awk '/^total:/ {gsub("%","",$3); print $3}')"
          echo "Total coverage: ${total}%"
          awk -v total="${total}" 'BEGIN { if ((total + 0) < 80.0) { printf("coverage %.1f%% is below 80%%\n", total); exit 1 } }'

  go-integration:
    name: Go Integration (Postgres)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: go-quality
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: identrail
          POSTGRES_PASSWORD: secret
          POSTGRES_DB: identrail
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U identrail -d identrail"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run Integration Tests
        env:
          IDENTRAIL_INTEGRATION_DATABASE_URL: postgres://identrail:secret@127.0.0.1:5432/identrail?sslmode=disable
        run: go test -tags=integration ./internal/integration -count=1 -v

  go-cli-smoke:
    name: CLI Smoke
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: go-quality
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: CLI Scan Smoke (Table + JSON)
        shell: bash
        run: |
          set -euo pipefail
          state_file="/tmp/identrail-smoke-state.json"
          go run ./cmd/cli --state-file "${state_file}" scan \
            --fixture testdata/aws/role_with_policies.json \
            --fixture testdata/aws/role_with_urlencoded_trust.json \
            --output table
          go run ./cmd/cli --state-file "${state_file}" findings --output json > /tmp/identrail-findings.json
          grep -q '"findings"' /tmp/identrail-findings.json

      - name: CLI Repo Scan Smoke
        shell: bash
        run: |
          set -euo pipefail
          go run ./cmd/cli repo-scan --repo . --history-limit 20 --max-findings 50 --output json > /tmp/identrail-repo-scan.json

  web-build:
    name: Web Build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install Web Dependencies
        run: npm ci --prefix web

      - name: Run Web Tests
        run: npm run test:ci --prefix web

      - name: Build Web
        run: npm run build --prefix web

  infra-validate:
    name: Infra Validate
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Helm
        uses: azure/setup-helm@v4

      - name: Helm Lint
        run: helm lint deploy/helm/identrail

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Format Check
        run: terraform fmt -check -recursive deploy/terraform

      - name: Terraform Validate
        shell: bash
        run: |
          set -euo pipefail
          cd deploy/terraform
          terraform init -backend=false
          terraform validate

  deploy-portability:
    name: Deploy Portability
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [go-quality, web-build, go-cli-smoke, infra-validate]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Validate Docker Compose Config
        shell: bash
        run: |
          set -euo pipefail
          cp deploy/docker/.env.example deploy/docker/.env
          docker compose -f deploy/docker/docker-compose.yml --env-file deploy/docker/.env config > /tmp/identrail-compose.yml

      - name: Build API Image
        run: docker build -f deploy/docker/Dockerfile.backend --build-arg TARGET=server -t identrail/api:ci .

      - name: Build Worker Image
        run: docker build -f deploy/docker/Dockerfile.backend --build-arg TARGET=worker -t identrail/worker:ci .

      - name: Build Web Image
        run: docker build -f deploy/docker/Dockerfile.web --build-arg VITE_IDENTRAIL_API_URL=http://localhost:8080 -t identrail/web:ci .

      - name: Compose API Smoke (Postgres + API)
        shell: bash
        run: |
          set -euo pipefail
          cat > deploy/docker/.env <<'EOF'
          IDENTRAIL_SERVICE_NAME=identrail
          IDENTRAIL_LOG_LEVEL=info
          IDENTRAIL_PROVIDER=aws
          IDENTRAIL_AWS_SOURCE=fixture
          IDENTRAIL_AWS_REGION=us-east-1
          IDENTRAIL_AWS_FIXTURES=/app/testdata/aws/role_with_policies.json,/app/testdata/aws/role_with_urlencoded_trust.json
          IDENTRAIL_K8S_SOURCE=fixture
          IDENTRAIL_K8S_FIXTURES=/app/testdata/kubernetes/service_account_payments.json,/app/testdata/kubernetes/cluster_role_cluster_admin.json,/app/testdata/kubernetes/role_binding_cluster_admin.json,/app/testdata/kubernetes/pod_payments.json
          IDENTRAIL_API_KEYS=ci-read,ci-write
          IDENTRAIL_WRITE_API_KEYS=ci-write
          IDENTRAIL_RATE_LIMIT_RPM=10000
          IDENTRAIL_RATE_LIMIT_BURST=1000
          IDENTRAIL_LOCK_BACKEND=auto
          IDENTRAIL_LOCK_NAMESPACE=identrail-ci
          IDENTRAIL_REPO_SCAN_ENABLED=false
          IDENTRAIL_AUDIT_LOG_FILE=
          IDENTRAIL_SCAN_INTERVAL=15m
          IDENTRAIL_WORKER_RUN_NOW=false
          VITE_IDENTRAIL_API_URL=http://localhost:8080
          EOF

          docker tag identrail/api:ci identrail/api:local
          docker compose -f deploy/docker/docker-compose.yml --env-file deploy/docker/.env up -d postgres api

          healthy=false
          for i in $(seq 1 30); do
            if curl -fsS http://localhost:8080/healthz >/dev/null; then
              healthy=true
              break
            fi
            sleep 2
          done
          if [ "${healthy}" != "true" ]; then
            echo "API failed health check; dumping container diagnostics"
            docker compose -f deploy/docker/docker-compose.yml --env-file deploy/docker/.env ps
            docker compose -f deploy/docker/docker-compose.yml --env-file deploy/docker/.env logs api postgres || true
            exit 1
          fi
          curl -fsS http://localhost:8080/healthz

          curl -fsS -X POST http://localhost:8080/v1/scans \
            -H 'X-API-Key: ci-write' \
            -H 'Content-Type: application/json' \
            > /tmp/identrail-scan-run.json

          curl -fsS http://localhost:8080/v1/findings?limit=5 \
            -H 'X-API-Key: ci-read' \
            > /tmp/identrail-findings-smoke.json
          grep -q '"items"' /tmp/identrail-findings-smoke.json

      - name: Compose Teardown
        if: always()
        shell: bash
        run: |
          docker compose -f deploy/docker/docker-compose.yml --env-file deploy/docker/.env down -v --remove-orphans || true
