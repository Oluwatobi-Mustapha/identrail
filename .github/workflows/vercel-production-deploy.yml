name: Vercel Production Deploy

on:
  push:
    branches:
      - dev
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: vercel-production-deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy to Vercel Production
    if: github.repository == 'identrail/identrail' && (github.event_name != 'workflow_dispatch' || github.ref_name == 'dev')
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      VERCEL_DEPLOY_HOOK_URL: ${{ secrets.VERCEL_DEPLOY_HOOK_URL }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Validate required Vercel identifiers
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          set -euo pipefail
          if [ -z "$VERCEL_ORG_ID" ] || [ -z "$VERCEL_PROJECT_ID" ]; then
            echo "Missing Vercel identifiers. Set VERCEL_ORG_ID and VERCEL_PROJECT_ID repository secrets."
            exit 1
          fi

      - name: Normalize Vercel token secret
        id: normalize-token
        env:
          RAW_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          set -euo pipefail
          token="$(printf '%s' "$RAW_TOKEN" | tr -d '\r\n' | sed -e 's/^"//' -e 's/"$//')"
          if [ -z "$token" ]; then
            echo "has_token=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "::add-mask::$token"
          {
            echo "has_token=true"
            echo "token=$token"
          } >> "$GITHUB_OUTPUT"

      - name: Verify Vercel token
        id: verify-token
        if: steps.normalize-token.outputs.has_token == 'true'
        continue-on-error: true
        env:
          VERCEL_TOKEN: ${{ steps.normalize-token.outputs.token }}
        run: |
          set -euo pipefail
          curl -fsS -H "Authorization: Bearer $VERCEL_TOKEN" https://api.vercel.com/v2/user > /tmp/vercel-user.json
          echo "Token verified for Vercel user:"
          jq -r '.user.username // .username // "unknown"' /tmp/vercel-user.json

      - name: Check VITE_IDENTRAIL_API_URL variable
        id: check-api-url
        if: steps.normalize-token.outputs.has_token == 'true'
        env:
          VITE_IDENTRAIL_API_URL: ${{ vars.VITE_IDENTRAIL_API_URL }}
          IDENTRAIL_CLOUD_API_URL: https://api.identrail.com
          IDENTRAIL_WEB_ORIGINS: https://identrail.com,https://www.identrail.com,https://app.identrail.com
        run: |
          set -euo pipefail
          api_url="$(printf '%s' "${VITE_IDENTRAIL_API_URL:-${IDENTRAIL_CLOUD_API_URL}}" | tr -d '\r\n' | sed -e 's/^[[:space:]]*//' -e 's/[[:space:]]*$//')"
          if [ -z "${VITE_IDENTRAIL_API_URL}" ]; then
            echo "vars.VITE_IDENTRAIL_API_URL is not set; using Identrail Cloud default ${IDENTRAIL_CLOUD_API_URL}."
          fi
          ./scripts/check_public_api_url.sh "${api_url}"
          {
            echo "api_url=${api_url}"
            echo "has_api_url=true"
          } >> "$GITHUB_OUTPUT"

      - name: Upsert Vercel production web env
        if: steps.normalize-token.outputs.has_token == 'true' && steps.check-api-url.outputs.has_api_url == 'true'
        env:
          VERCEL_TOKEN: ${{ steps.normalize-token.outputs.token }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VITE_IDENTRAIL_API_URL: ${{ steps.check-api-url.outputs.api_url }}
          VITE_FEATURE_ONBOARDING_WIZARD: ${{ vars.VITE_FEATURE_ONBOARDING_WIZARD || 'true' }}
        run: |
          set -euo pipefail
          onboarding_flag="$(printf '%s' "${VITE_FEATURE_ONBOARDING_WIZARD}" | tr -d '\r\n' | sed -e 's/^[[:space:]]*//' -e 's/[[:space:]]*$//')"
          case "${onboarding_flag}" in
            true|false) ;;
            *)
              echo "VITE_FEATURE_ONBOARDING_WIZARD must be true or false; got ${onboarding_flag}." >&2
              exit 1
              ;;
          esac

          upsert_env() {
            local key="$1"
            local value="$2"
            local comment="$3"

            payload="$(jq -n \
              --arg key "${key}" \
              --arg value "${value}" \
              --arg comment "${comment}" \
              '{
                key: $key,
                value: $value,
                type: "plain",
                target: ["production", "preview"],
                comment: $comment
              }')"

            curl -fsS -X POST \
              "https://api.vercel.com/v10/projects/${VERCEL_PROJECT_ID}/env?upsert=true&teamId=${VERCEL_ORG_ID}" \
              -H "Authorization: Bearer ${VERCEL_TOKEN}" \
              -H "Content-Type: application/json" \
              -d "${payload}" \
              > "/tmp/vercel-env-upsert-${key}.json"
            jq -r '.created.key // "Vercel env upserted."' "/tmp/vercel-env-upsert-${key}.json"
          }

          upsert_env \
            "VITE_IDENTRAIL_API_URL" \
            "${VITE_IDENTRAIL_API_URL}" \
            "Identrail web -> API base URL (required for production builds)"
          upsert_env \
            "VITE_FEATURE_ONBOARDING_WIZARD" \
            "${onboarding_flag}" \
            "Enable self-serve onboarding for Identrail Cloud production builds"

      - name: Deploy to Vercel
        id: deploy-action
        if: steps.normalize-token.outputs.has_token == 'true'
        continue-on-error: true
        uses: amondnet/vercel-action@4b810e26f7bb2a331c698af186f890cbf20d5f72 # v42.2.0
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          github-comment: false
          vercel-token: ${{ steps.normalize-token.outputs.token }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          target: production
          force: true
          root-directory: web

      - name: Fallback deploy via hook
        id: deploy-hook
        if: (steps.normalize-token.outputs.has_token != 'true' || steps.deploy-action.outcome != 'success') && env.VERCEL_DEPLOY_HOOK_URL != ''
        run: |
          set -euo pipefail
          curl -fsS -X POST "$VERCEL_DEPLOY_HOOK_URL" > /tmp/vercel-hook-response.json
          echo "Triggered Vercel deploy hook successfully."

      - name: Fail if no deployment path succeeded
        if: steps.deploy-action.outcome != 'success' && steps.deploy-hook.outcome != 'success'
        run: |
          echo "Vercel deployment failed."
          echo "Root cause is usually an invalid/stale VERCEL_TOKEN."
          echo "Fix by rotating VERCEL_TOKEN, or set VERCEL_DEPLOY_HOOK_URL for hook-based fallback."
          exit 1
