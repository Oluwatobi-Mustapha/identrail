apiVersion: batch/v1
kind: Job
metadata:
  name: identrail-migrations
  namespace: identrail
  labels:
    app: identrail-migrations
spec:
  backoffLimit: 3
  ttlSecondsAfterFinished: 300
  template:
    metadata:
      labels:
        app: identrail-migrations
    spec:
      restartPolicy: OnFailure
      securityContext:
        runAsNonRoot: true
      containers:
        - name: migrations
          image: ghcr.io/oluwatobi-mustapha/identrail-api:latest
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: identrail-config
            - secretRef:
                name: identrail-secrets
          env:
            - name: IDENTRAIL_RUN_MIGRATIONS
              value: "true"
            - name: IDENTRAIL_RUN_MIGRATIONS_ONLY
              value: "true"
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
