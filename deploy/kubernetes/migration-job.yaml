apiVersion: batch/v1
kind: Job
metadata:
  name: identrail-migrations
  namespace: identrail
  labels:
    app: identrail-migrations
spec:
  backoffLimit: 3
  ttlSecondsAfterFinished: 300
  template:
    metadata:
      labels:
        app: identrail-migrations
    spec:
      restartPolicy: OnFailure
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: migrations
          image: ghcr.io/identrail/identrail-api:v1.0.0
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: identrail-config
            - secretRef:
                name: identrail-secrets
          env:
            - name: IDENTRAIL_RUN_MIGRATIONS
              value: "true"
            - name: IDENTRAIL_RUN_MIGRATIONS_ONLY
              value: "true"
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
