apiVersion: v1
kind: List
items:
  - apiVersion: networking.k8s.io/v1
    kind: NetworkPolicy
    metadata:
      name: identrail-default-deny
      namespace: identrail
    spec:
      podSelector:
        matchExpressions:
          - key: app
            operator: In
            values:
              - identrail-api
              - identrail-worker
              - identrail-migrations
      policyTypes:
        - Ingress
        - Egress
  - apiVersion: networking.k8s.io/v1
    kind: NetworkPolicy
    metadata:
      name: identrail-postgres-ingress
      namespace: identrail
    spec:
      podSelector:
        matchLabels:
          app: postgres
      policyTypes:
        - Ingress
      ingress:
        - from:
            - podSelector:
                matchExpressions:
                  - key: app
                    operator: In
                    values:
                      - identrail-api
                      - identrail-worker
                      - identrail-migrations
          ports:
            - protocol: TCP
              port: 5432
  - apiVersion: networking.k8s.io/v1
    kind: NetworkPolicy
    metadata:
      name: identrail-api-ingress
      namespace: identrail
    spec:
      podSelector:
        matchLabels:
          app: identrail-api
      policyTypes:
        - Ingress
      ingress:
        - ports:
            - protocol: TCP
              port: 8080
  - apiVersion: networking.k8s.io/v1
    kind: NetworkPolicy
    metadata:
      name: identrail-runtime-egress
      namespace: identrail
    spec:
      podSelector:
        matchExpressions:
          - key: app
            operator: In
            values:
              - identrail-api
              - identrail-worker
              - identrail-migrations
      policyTypes:
        - Egress
      egress:
        - to:
            - namespaceSelector: {}
          ports:
            - protocol: UDP
              port: 53
            - protocol: TCP
              port: 53
        - ports:
            - protocol: TCP
              port: 443
            - protocol: TCP
              port: 5432
