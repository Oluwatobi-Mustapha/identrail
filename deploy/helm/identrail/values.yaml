nameOverride: ""
fullnameOverride: ""

imagePullSecrets: []

api:
  replicaCount: 2
  image:
    repository: ghcr.io/identrail/identrail-api
    tag: v1.0.0
    pullPolicy: IfNotPresent
  podSecurityContext:
    runAsNonRoot: true
  securityContext:
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: true
    capabilities:
      drop:
        - ALL
  service:
    type: ClusterIP
    port: 8080
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

worker:
  replicaCount: 1
  image:
    repository: ghcr.io/identrail/identrail-worker
    tag: v1.0.0
    pullPolicy: IfNotPresent
  podSecurityContext:
    runAsNonRoot: true
  securityContext:
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: true
    capabilities:
      drop:
        - ALL
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

migrations:
  enabled: true
  backoffLimit: 3
  ttlSecondsAfterFinished: 300

web:
  enabled: false
  replicaCount: 1
  image:
    repository: ghcr.io/identrail/identrail-web
    tag: v1.0.0
    pullPolicy: IfNotPresent
  podSecurityContext:
    runAsNonRoot: true
    runAsUser: 101
    runAsGroup: 101
    seccompProfile:
      type: RuntimeDefault
  securityContext:
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: true
    runAsNonRoot: true
    runAsUser: 101
    runAsGroup: 101
    capabilities:
      drop:
        - ALL
  readinessProbe:
    httpGet:
      path: /
      port: http
    initialDelaySeconds: 5
    periodSeconds: 10
  livenessProbe:
    httpGet:
      path: /
      port: http
    initialDelaySeconds: 15
    periodSeconds: 20
  service:
    type: ClusterIP
    port: 8080
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 250m
      memory: 256Mi

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: identrail.local
      paths:
        - path: /
          pathType: Prefix
  tls: []

serviceAccount:
  create: true
  annotations: {}
  name: ""

networkPolicy:
  enabled: false

podDisruptionBudget:
  api:
    enabled: false
    minAvailable: 1

autoscaling:
  api:
    enabled: false
    minReplicas: 2
    maxReplicas: 5
    targetCPUUtilizationPercentage: 70
  web:
    enabled: false
    minReplicas: 2
    maxReplicas: 5
    targetCPUUtilizationPercentage: 70

config:
  IDENTRAIL_SERVICE_NAME: identrail
  IDENTRAIL_LOG_LEVEL: info
  IDENTRAIL_PROVIDER: aws
  IDENTRAIL_AWS_SOURCE: sdk
  IDENTRAIL_AWS_REGION: us-east-1
  IDENTRAIL_AWS_PROFILE: ""
  IDENTRAIL_FEATURE_CONNECTOR_AWS: "false"
  IDENTRAIL_AWS_CFN_TEMPLATE_URL: ""
  IDENTRAIL_AWS_ACCOUNT_ID: ""
  IDENTRAIL_FEATURE_CONNECTOR_GITHUB_V2: "false"
  IDENTRAIL_GITHUB_APP_ID: ""
  IDENTRAIL_GITHUB_APP_NAME: ""
  IDENTRAIL_GITHUB_APP_PRIVATE_KEY: ""
  IDENTRAIL_GITHUB_APP_WEBHOOK_SECRET: ""
  IDENTRAIL_GITHUB_PAT_ALLOWED_BASE_URLS: "https://github.com"
  IDENTRAIL_K8S_SOURCE: kubectl
  IDENTRAIL_KUBECTL_PATH: /usr/bin/kubectl
  IDENTRAIL_KUBE_CONTEXT: ""
  IDENTRAIL_REQUIRE_LIVE_SOURCES: "true"
  IDENTRAIL_HTTP_ADDR: ":8080"
  IDENTRAIL_LOCK_BACKEND: auto
  IDENTRAIL_LOCK_NAMESPACE: identrail
  # Keep shared pods non-migrating; use the dedicated migrations job instead.
  IDENTRAIL_RUN_MIGRATIONS: "false"
  IDENTRAIL_RUN_MIGRATIONS_ONLY: "false"
  IDENTRAIL_MIGRATIONS_DIR: /app/migrations
  IDENTRAIL_SCAN_INTERVAL: 15m
  IDENTRAIL_WORKER_RUN_NOW: "true"
  IDENTRAIL_WORKER_API_JOB_QUEUE_ENABLED: "true"
  IDENTRAIL_WORKER_API_JOB_QUEUE_INTERVAL: 2s
  IDENTRAIL_WORKER_API_JOB_QUEUE_BATCH_SIZE: "5"
  IDENTRAIL_WORKER_REPO_SCAN_ENABLED: "false"
  IDENTRAIL_WORKER_REPO_SCAN_RUN_NOW: "false"
  IDENTRAIL_WORKER_REPO_SCAN_INTERVAL: 1h
  IDENTRAIL_WORKER_REPO_SCAN_TARGETS: ""
  IDENTRAIL_WORKER_REPO_SCAN_HISTORY_LIMIT: "0"
  IDENTRAIL_WORKER_REPO_SCAN_MAX_FINDINGS: "0"
  IDENTRAIL_REPO_SCAN_ENABLED: "false"
  IDENTRAIL_REPO_SCAN_HISTORY_LIMIT: "500"
  IDENTRAIL_REPO_SCAN_MAX_FINDINGS: "200"
  IDENTRAIL_REPO_SCAN_HISTORY_LIMIT_MAX: "5000"
  IDENTRAIL_REPO_SCAN_MAX_FINDINGS_MAX: "1000"
  IDENTRAIL_REPO_SCAN_ALLOWLIST: ""
  IDENTRAIL_APP_MODE_ENABLED: "false"
  IDENTRAIL_APP_MODE_CONNECTORS_ENABLED: "false"
  IDENTRAIL_APP_MODE_SCHEDULER_ENABLED: "false"
  IDENTRAIL_APP_MODE_REMEDIATION_ENABLED: "false"
  IDENTRAIL_APP_MODE_PREMIUM_ENABLED: "false"
  IDENTRAIL_APP_MODE_PREMIUM_REPORTS_ENABLED: "false"
  IDENTRAIL_APP_MODE_PREMIUM_AUTOFIX_ENABLED: "false"
  IDENTRAIL_APP_MODE_ROLLOUT_ENABLED: "false"
  IDENTRAIL_APP_MODE_ROLLOUT_CANARY_PERCENT: "0"
  IDENTRAIL_APP_MODE_ROLLOUT_TENANT_ALLOWLIST: ""
  IDENTRAIL_APP_MODE_ROLLOUT_WORKSPACE_ALLOWLIST: ""
  IDENTRAIL_RATE_LIMIT_RPM: "120"
  IDENTRAIL_RATE_LIMIT_BURST: "20"
  IDENTRAIL_SCAN_QUEUE_MAX_PENDING: "25"
  IDENTRAIL_REPO_SCAN_QUEUE_MAX_PENDING: "100"
  IDENTRAIL_CORS_ALLOWED_ORIGINS: https://app.example.com
  IDENTRAIL_TRUSTED_PROXIES: ""
  IDENTRAIL_OIDC_ISSUER_URL: ""
  IDENTRAIL_OIDC_AUDIENCE: ""
  IDENTRAIL_OIDC_WRITE_SCOPES: identrail.write,identrail.admin,write,admin
  IDENTRAIL_DEFAULT_TENANT_ID: default
  IDENTRAIL_DEFAULT_WORKSPACE_ID: default
  IDENTRAIL_REQUIRE_EXPLICIT_SCOPE: "true"
  IDENTRAIL_ALLOW_MEMORY_STORE: "false"
  IDENTRAIL_CONNECTOR_SECRET_KEYS_REQUIRED: "false"
  IDENTRAIL_OIDC_TENANT_CLAIM: tenant_id
  IDENTRAIL_OIDC_WORKSPACE_CLAIM: workspace_id
  IDENTRAIL_OIDC_GROUPS_CLAIM: groups
  IDENTRAIL_OIDC_ROLES_CLAIM: roles
  IDENTRAIL_POSTGRES_RLS_ENFORCED: "true"
  IDENTRAIL_AWS_FIXTURES: /app/testdata/aws/role_with_policies.json,/app/testdata/aws/role_with_urlencoded_trust.json
  IDENTRAIL_K8S_FIXTURES: /app/testdata/kubernetes/service_account_payments.json,/app/testdata/kubernetes/cluster_role_cluster_admin.json,/app/testdata/kubernetes/role_binding_cluster_admin.json,/app/testdata/kubernetes/pod_payments.json

secret:
  create: false
  # Production should prefer existingSecret/external secret management.
  # Helm-created secrets can be stored in Helm release history.
  existingSecret: identrail-secrets
  data:
    IDENTRAIL_API_KEYS: ""
    IDENTRAIL_WRITE_API_KEYS: ""
    IDENTRAIL_METRICS_API_KEY: ""
    IDENTRAIL_DATABASE_URL: "postgres://identrail:replace-password@postgres:5432/identrail?sslmode=require"
    IDENTRAIL_CONNECTOR_SECRET_KEYS: ""
    IDENTRAIL_API_KEY_SCOPES: ""
    IDENTRAIL_ALERT_WEBHOOK_URL: ""
    IDENTRAIL_ALERT_HMAC_SECRET: ""
    IDENTRAIL_ALERT_MIN_SEVERITY: high
    IDENTRAIL_ALERT_MAX_FINDINGS: "25"
    IDENTRAIL_ALERT_MAX_RETRIES: "2"
    IDENTRAIL_ALERT_RETRY_BACKOFF: 1s
    IDENTRAIL_AUDIT_LOG_FILE: ""
    IDENTRAIL_AUDIT_FORWARD_URL: ""
    IDENTRAIL_AUDIT_FORWARD_TIMEOUT: 3s
    IDENTRAIL_AUDIT_FORWARD_MAX_RETRIES: "1"
    IDENTRAIL_AUDIT_FORWARD_RETRY_BACKOFF: 1s
    IDENTRAIL_AUDIT_FORWARD_HMAC_SECRET: ""
    IDENTRAIL_AUDIT_FINGERPRINT_SECRET: ""
