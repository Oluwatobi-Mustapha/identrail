apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "identrail-agent.fullname" . }}-secret-writer
  labels:
    app.kubernetes.io/name: {{ include "identrail-agent.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
rules:
  - apiGroups: [""]
    resources:
      - secrets
    resourceNames:
      - {{ include "identrail-agent.fullname" . }}-enrollment
    verbs:
      - get
      - patch
      - update
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "identrail-agent.fullname" . }}-secret-writer
  labels:
    app.kubernetes.io/name: {{ include "identrail-agent.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "identrail-agent.fullname" . }}-secret-writer
subjects:
  - kind: ServiceAccount
    name: {{ include "identrail-agent.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
