apiVersion: v1
kind: Secret
metadata:
  name: {{ include "identrail-agent.fullname" . }}-enrollment
  labels:
    app.kubernetes.io/name: {{ include "identrail-agent.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
type: Opaque
stringData:
  enrollment-token: {{ required "enrollment.token is required" .Values.enrollment.token | quote }}
