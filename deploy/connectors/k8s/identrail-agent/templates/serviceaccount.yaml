{{- if .Values.serviceAccount.create }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "identrail-agent.serviceAccountName" . }}
  labels:
    app.kubernetes.io/name: {{ include "identrail-agent.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
automountServiceAccountToken: true
{{- end }}
