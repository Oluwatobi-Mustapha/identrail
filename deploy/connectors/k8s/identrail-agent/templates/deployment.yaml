apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "identrail-agent.fullname" . }}
  labels:
    app.kubernetes.io/name: {{ include "identrail-agent.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "identrail-agent.name" . }}
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "identrail-agent.name" . }}
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      serviceAccountName: {{ include "identrail-agent.serviceAccountName" . }}
      automountServiceAccountToken: true
      securityContext:
{{ toYaml .Values.podSecurityContext | indent 8 }}
      containers:
        - name: identrail-agent
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args:
            - --api-url={{ required "api.url is required" .Values.api.url }}
            - --heartbeat-interval={{ .Values.agent.heartbeatInterval }}
            - --scan-secret-values={{ .Values.agent.scanSecretValues }}
          env:
            - name: IDENTRAIL_ENROLLMENT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "identrail-agent.fullname" . }}-enrollment
                  key: enrollment-token
            - name: IDENTRAIL_AGENT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "identrail-agent.fullname" . }}-enrollment
                  key: agent-token
                  optional: true
            - name: IDENTRAIL_AGENT_TOKEN_SECRET_NAME
              value: {{ include "identrail-agent.fullname" . }}-enrollment
            - name: IDENTRAIL_AGENT_TOKEN_SECRET_KEY
              value: agent-token
            - name: IDENTRAIL_AGENT_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          securityContext:
{{ toYaml .Values.securityContext | indent 12 }}
          resources:
{{ toYaml .Values.resources | indent 12 }}
