AWSTemplateFormatVersion: '2010-09-09'
Description: Identrail read-only machine identity connector role.

Parameters:
  IdentrailAccountId:
    Type: String
    AllowedPattern: '^[0-9]{12}$'
    Description: AWS account ID for the Identrail deployment that assumes this role.
  ExternalId:
    Type: String
    MinLength: 16
    NoEcho: true
    Description: Connector-specific External ID generated by Identrail.
  RoleName:
    Type: String
    Default: IdentrailReadOnly
    AllowedPattern: '^[A-Za-z0-9+=,.@_-]{1,64}$'
    Description: IAM role name to create for Identrail.

Resources:
  IdentrailReadOnlyRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName:
        Ref: RoleName
      Description: Read-only role used by Identrail to build machine identity trust graphs.
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              AWS:
                Fn::Sub: arn:${AWS::Partition}:iam::${IdentrailAccountId}:root
            Action: sts:AssumeRole
            Condition:
              StringEquals:
                sts:ExternalId:
                  Ref: ExternalId
      Policies:
        - PolicyName: IdentrailReadOnlyCollector
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Sid: IdentityTrustGraphReadOnlyIAM
                Effect: Allow
                Action:
                  - iam:GetAccountSummary
                  - iam:GetPolicy
                  - iam:GetPolicyVersion
                  - iam:GetRole
                  - iam:GetRolePolicy
                  - iam:ListAccountAliases
                  - iam:ListAttachedRolePolicies
                  - iam:ListRolePolicies
                  - iam:ListRoles
                  - iam:SimulatePrincipalPolicy
                Resource: '*'
              - Sid: IdentityTrustGraphReadOnlyCompute
                Effect: Allow
                Action:
                  - ec2:DescribeIamInstanceProfileAssociations
                  - ec2:DescribeInstances
                  - ec2:DescribeRegions
                Resource: '*'
              - Sid: IdentityTrustGraphReadOnlyStorage
                Effect: Allow
                Action:
                  - s3:GetBucketAcl
                  - s3:GetBucketPolicy
                  - s3:GetBucketPublicAccessBlock
                  - s3:ListAllMyBuckets
                Resource: '*'
              - Sid: IdentityTrustGraphReadOnlyKMS
                Effect: Allow
                Action:
                  - kms:DescribeKey
                  - kms:GetKeyPolicy
                  - kms:ListKeys
                Resource: '*'
              - Sid: IdentityTrustGraphCallerIdentity
                Effect: Allow
                Action: sts:GetCallerIdentity
                Resource: '*'

Outputs:
  RoleArn:
    Description: Paste this ARN back into Identrail to validate the connector.
    Value:
      Fn::GetAtt:
        - IdentrailReadOnlyRole
        - Arn
  ExternalIdConfigured:
    Description: Confirms the External ID condition was configured.
    Value: true
