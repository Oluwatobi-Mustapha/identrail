<svg width="1280" height="320" viewBox="0 0 1280 320" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Identrail Wordmark</title>
  <desc id="desc">Premium brand wordmark for Identrail with shield-rail monogram and gradient typography.</desc>

  <defs>
    <linearGradient id="shieldGradient" x1="48" y1="40" x2="248" y2="280" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#8FD3FF"/>
      <stop offset="0.45" stop-color="#3AA2FF"/>
      <stop offset="1" stop-color="#2B5BFF"/>
    </linearGradient>

    <linearGradient id="railGradient" x1="74" y1="70" x2="226" y2="248" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#EAF7FF"/>
      <stop offset="0.6" stop-color="#9DD4FF"/>
      <stop offset="1" stop-color="#4B83FF"/>
    </linearGradient>

    <linearGradient id="textGradient" x1="300" y1="82" x2="1180" y2="240" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#EEF7FF"/>
      <stop offset="0.34" stop-color="#A8C8FF"/>
      <stop offset="0.68" stop-color="#6A8CFF"/>
      <stop offset="1" stop-color="#2F58E8"/>
    </linearGradient>

    <linearGradient id="taglineGradient" x1="300" y1="236" x2="1060" y2="236" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#6D7EA6"/>
      <stop offset="1" stop-color="#4E5F88"/>
    </linearGradient>

    <filter id="softGlow" x="0" y="0" width="320" height="320" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feFlood flood-opacity="0" result="BackgroundImageFix"/>
      <feBlend mode="normal" in="SourceGraphic" in2="BackgroundImageFix" result="shape"/>
      <feGaussianBlur stdDeviation="10" result="effect1_foregroundBlur"/>
    </filter>
  </defs>

  <g filter="url(#softGlow)" opacity="0.55">
    <path d="M160 28L50 78V168C50 227 98 273 160 292C222 273 270 227 270 168V78L160 28Z" fill="url(#shieldGradient)"/>
  </g>

  <path d="M160 38L62 82V166C62 219 104 260 160 278C216 260 258 219 258 166V82L160 38Z" fill="#0E1833" stroke="url(#shieldGradient)" stroke-width="7"/>

  <path d="M109 87V207" stroke="url(#railGradient)" stroke-width="16" stroke-linecap="round"/>
  <path d="M160 70V228" stroke="url(#railGradient)" stroke-width="16" stroke-linecap="round"/>
  <path d="M211 95V197" stroke="url(#railGradient)" stroke-width="16" stroke-linecap="round"/>

  <path d="M93 124H227" stroke="url(#railGradient)" stroke-width="10" stroke-linecap="round" opacity="0.9"/>
  <path d="M89 165H231" stroke="url(#railGradient)" stroke-width="10" stroke-linecap="round" opacity="0.7"/>

  <text x="312" y="176" fill="url(#textGradient)" font-size="112" font-weight="800" letter-spacing="7" font-family="'Avenir Next', 'Segoe UI', 'Helvetica Neue', Arial, sans-serif">IDENTRAIL</text>
  <rect x="312" y="194" width="864" height="4" rx="2" fill="url(#textGradient)" opacity="0.45"/>
  <text x="314" y="240" fill="url(#taglineGradient)" font-size="30" font-weight="600" letter-spacing="2.2" font-family="'Avenir Next', 'Segoe UI', 'Helvetica Neue', Arial, sans-serif">MACHINE IDENTITY SECURITY PLATFORM</text>
</svg>
