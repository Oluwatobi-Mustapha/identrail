openapi: 3.0.3
info:
  title: Identrail API
  version: "1.0.0"
  description: |
    V1 machine identity security API for AWS and Kubernetes discovery, graphing, and findings.
servers:
  - url: http://localhost:8080
    description: Local development
tags:
  - name: Health
  - name: Authorization
  - name: EnterpriseAuth
  - name: Tenancy
  - name: ProjectManagement
  - name: Findings
  - name: Scans
  - name: Explorer
  - name: RepositoryExposure
security:
  - ApiKeyAuth: []
  - BearerAuth: []
  - CookieAuth: []
