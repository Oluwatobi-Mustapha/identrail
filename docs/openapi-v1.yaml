components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    scopeTenantID:
      in: header
      name: X-Identrail-Tenant-ID
      required: false
      schema:
        type: string
      description: Optional tenant scope override when token claims do not provide tenant context.
    scopeWorkspaceID:
      in: header
      name: X-Identrail-Workspace-ID
      required: false
      schema:
        type: string
      description: Optional workspace scope override when token claims do not provide workspace context.
    limit:
      in: query
      name: limit
      schema:
        type: integer
        minimum: 1
    cursor:
      in: query
      name: cursor
      schema:
        type: integer
        minimum: 0
    sortBy:
      in: query
      name: sort_by
      schema:
        type: string
      description: Endpoint-specific sort field.
    sortOrder:
      in: query
      name: sort_order
      schema:
        type: string
        enum: [asc, desc]
      description: Sort direction.
  responses:
    Unauthorized:
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    NotFound:
      description: Not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
  schemas:
    ErrorResponse:
      type: object
      properties:
        error:
          type: string
    Organization:
      type: object
      properties:
        tenant_id: { type: string }
        display_name: { type: string }
        slug: { type: string }
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    OrganizationUpsertRequest:
      type: object
      required: [display_name, slug]
      properties:
        display_name: { type: string }
        slug: { type: string }
    Workspace:
      type: object
      properties:
        tenant_id: { type: string }
        workspace_id: { type: string }
        display_name: { type: string }
        slug: { type: string }
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    WorkspaceUpsertRequest:
      type: object
      required: [workspace_id, display_name, slug]
      properties:
        workspace_id: { type: string }
        display_name: { type: string }
        slug: { type: string }
    WhoAmIPrincipal:
      type: object
      properties:
        type:
          type: string
          enum: [subject, api_key, anonymous]
        id:
          type: string
    WorkspaceContext:
      type: object
      properties:
        workspace:
          $ref: "#/components/schemas/Workspace"
        member:
          $ref: "#/components/schemas/WorkspaceMember"
        is_active:
          type: boolean
    WhoAmIResponse:
      type: object
      properties:
        principal:
          $ref: "#/components/schemas/WhoAmIPrincipal"
        roles:
          type: array
          items:
            type: string
        scopes:
          type: array
          items:
            type: string
        scope:
          type: object
          properties:
            tenant_id:
              type: string
            workspace_id:
              type: string
        active_workspace:
          $ref: "#/components/schemas/WorkspaceContext"
        workspaces:
          type: array
          items:
            $ref: "#/components/schemas/WorkspaceContext"
    ActiveWorkspaceSwitchRequest:
      type: object
      required: [workspace_id]
      properties:
        workspace_id:
          type: string
    ActiveWorkspaceSwitchResponse:
      type: object
      properties:
        active_workspace:
          $ref: "#/components/schemas/WorkspaceContext"
        scope:
          type: object
          properties:
            tenant_id:
              type: string
            workspace_id:
              type: string
        scope_headers:
          type: object
          properties:
            X-Identrail-Tenant-ID:
              type: string
            X-Identrail-Workspace-ID:
              type: string
    WorkspaceMemberRole:
      type: string
      enum: [owner, admin, analyst, viewer]
    WorkspaceMemberStatus:
      type: string
      enum: [invited, active, suspended, removed]
    WorkspaceMember:
      type: object
      properties:
        tenant_id: { type: string }
        workspace_id: { type: string }
        member_id: { type: string }
        user_id: { type: string }
        email: { type: string }
        role:
          $ref: "#/components/schemas/WorkspaceMemberRole"
        status:
          $ref: "#/components/schemas/WorkspaceMemberStatus"
        joined_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    WorkspaceMemberUpsertRequest:
      type: object
      required: [member_id, user_id, role, status]
      properties:
        member_id: { type: string }
        user_id: { type: string }
        email: { type: string }
        role:
          $ref: "#/components/schemas/WorkspaceMemberRole"
        status:
          $ref: "#/components/schemas/WorkspaceMemberStatus"
    Project:
      type: object
      properties:
        tenant_id: { type: string }
        workspace_id: { type: string }
        project_id: { type: string }
        name: { type: string }
        slug: { type: string }
        description: { type: string }
        archived_at:
          type: string
          format: date-time
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    ProjectUpsertRequest:
      type: object
      required: [project_id, name, slug]
      properties:
        project_id: { type: string }
        name: { type: string }
        slug: { type: string }
        description: { type: string }
        archived_at:
          type: string
          format: date-time
          nullable: true
    KubernetesConnectionUpsertRequest:
      type: object
      properties:
        connector_id:
          type: string
        display_name:
          type: string
        context:
          type: string
    KubernetesPermissionCheck:
      type: object
      properties:
        verb:
          type: string
        resource:
          type: string
        scope:
          type: string
        allowed:
          type: boolean
        diagnostic:
          type: string
        remediation:
          type: string
    KubernetesPreflightDiagnostic:
      type: object
      properties:
        code:
          type: string
        severity:
          type: string
          enum: [warning, error]
        message:
          type: string
        remediation:
          type: string
    KubernetesConnectionStatus:
      type: object
      properties:
        provider:
          type: string
          enum: [kubernetes]
        connected:
          type: boolean
        connector_id:
          type: string
        display_name:
          type: string
        status:
          type: string
          enum: [pending, active, degraded, disconnected]
        health_status:
          type: string
          enum: [unknown, healthy, warning, error]
        context:
          type: string
        cluster:
          type: string
        server:
          type: string
        git_version:
          type: string
        platform:
          type: string
        permission_checks:
          type: array
          items:
            $ref: "#/components/schemas/KubernetesPermissionCheck"
        diagnostics:
          type: array
          items:
            $ref: "#/components/schemas/KubernetesPreflightDiagnostic"
        remediation_message:
          type: string
        created_at:
          type: string
          format: date-time
          nullable: true
        updated_at:
          type: string
          format: date-time
          nullable: true
        last_validated_at:
          type: string
          format: date-time
          nullable: true
    AWSConnectionUpsertRequest:
      type: object
      required: [role_arn]
      properties:
        connector_id:
          type: string
        display_name:
          type: string
        role_arn:
          type: string
          example: arn:aws:iam::123456789012:role/IdentrailReadOnly
        external_id:
          type: string
          writeOnly: true
        region:
          type: string
          default: us-east-1
        session_name:
          type: string
          default: identrail-connector-validation
    AWSConnectionDiagnostic:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
        remediation:
          type: string
    AWSConnectionPermissionCheck:
      type: object
      properties:
        name:
          type: string
        passed:
          type: boolean
        message:
          type: string
        remediation:
          type: string
    AWSConnectionStatus:
      type: object
      properties:
        provider:
          type: string
          enum: [aws]
        connected:
          type: boolean
        connector_id:
          type: string
        display_name:
          type: string
        status:
          type: string
          enum: [pending, active, degraded, disconnected]
        health_status:
          type: string
          enum: [unknown, healthy, warning, error]
        role_arn:
          type: string
        external_id_configured:
          type: boolean
        account_id:
          type: string
        principal_arn:
          type: string
        user_id:
          type: string
        region:
          type: string
        permission_checks:
          type: array
          items:
            $ref: "#/components/schemas/AWSConnectionPermissionCheck"
        diagnostics:
          type: array
          items:
            $ref: "#/components/schemas/AWSConnectionDiagnostic"
        remediation_message:
          type: string
        created_at:
          type: string
          format: date-time
          nullable: true
        updated_at:
          type: string
          format: date-time
          nullable: true
        last_validated_at:
          type: string
          format: date-time
          nullable: true
