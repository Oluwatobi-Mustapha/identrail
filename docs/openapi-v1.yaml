    Finding:
      type: object
      properties:
        id: { type: string }
        scan_id: { type: string }
        type: { $ref: "#/components/schemas/FindingType" }
        severity: { $ref: "#/components/schemas/FindingSeverity" }
        confidence_score:
          type: number
          format: double
          description: Deterministic analyst-facing confidence score for the finding, from 0.0 to 1.0.
        title: { type: string }
        human_summary: { type: string }
        path:
          type: array
          items: { type: string }
        repository:
          type: string
          description: Repository target associated with one repo finding when available.
        commit:
          type: string
          description: Repository commit reference for one repo finding when available.
        file_path:
          type: string
          description: Repository file path for repo findings when available.
        line_number:
          type: integer
          minimum: 1
          description: Repository line number for repo findings when available.
        detector:
          type: string
          description: Repo exposure detector identifier when available.
        line_snippet:
          type: string
          description: Relevant line or match snippet, redacted when secret material must not be stored.
        line_snippet_redacted:
          type: boolean
          description: True when `line_snippet` has been redacted to avoid storing raw secrets.
        source_url:
          type: string
          format: uri
          description: Direct GitHub blob URL for the repository file and line when Identrail can derive one.
        evidence:
          type: object
          additionalProperties: true
        remediation: { type: string }
        created_at:
          type: string
          format: date-time
        triage:
          $ref: "#/components/schemas/FindingTriage"
