openapi: 3.0.3
info:
  title: Identrail API
  version: "1.0.0"
  description: |
    V1 machine identity security API for AWS and Kubernetes discovery, graphing, and findings.
servers:
  - url: http://localhost:8080
    description: Local development
tags:
  - name: Health
  - name: Authorization
  - name: Tenancy
  - name: ProjectManagement
  - name: Findings
  - name: Scans
  - name: Explorer
  - name: RepositoryExposure
security:
  - ApiKeyAuth: []
  - BearerAuth: []
paths:
  /healthz:
    get:
      tags: [Health]
      summary: Health check
      operationId: healthCheck
      security: []
      responses:
        "200":
          description: Service health
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                  service:
                    type: string
  /readyz:
    get:
      tags: [Health]
      summary: Readiness check
      operationId: readinessCheck
      security: []
      responses:
        "200":
          description: Service ready
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                  service:
                    type: string
        "503":
          description: Service not ready
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /metrics:
    get:
      tags: [Health]
      summary: Prometheus metrics endpoint
      operationId: metrics
      security: []
      responses:
        "200":
          description: Prometheus text exposition format
          content:
            text/plain:
              schema:
                type: string
  /webhooks/github:
    post:
      tags: [RepositoryExposure]
      summary: Receive GitHub webhook events for repository scan triggers
      operationId: receiveGitHubWebhook
      security: []
      parameters:
        - in: header
          name: X-GitHub-Event
          required: true
          schema: { type: string }
        - in: header
          name: X-GitHub-Delivery
          required: false
          schema: { type: string }
        - in: header
          name: X-Hub-Signature-256
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        "202":
          description: Webhook accepted
          content:
            application/json:
              schema:
                type: object
                properties:
                  webhook:
                    $ref: "#/components/schemas/GitHubWebhookResult"
        "400":
          description: Invalid webhook payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Invalid webhook signature
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /v1/authz/policies/simulate:
    parameters:
      - $ref: "#/components/parameters/scopeTenantID"
      - $ref: "#/components/parameters/scopeWorkspaceID"
    post:
      tags: [Authorization]
      summary: Simulate authorization policy decision
      operationId: simulateAuthorizationPolicy
      description: Evaluate one authorization decision with stage-by-stage trace output.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AuthzPolicySimulationRequest"
      responses:
        "200":
          description: Simulated policy decision and trace
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthzPolicySimulationResponse"
        "400":
          description: Invalid simulation request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Policy version not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Failed to simulate policy decision
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /v1/authz/policies/rollback:
    parameters:
      - $ref: "#/components/parameters/scopeTenantID"
      - $ref: "#/components/parameters/scopeWorkspaceID"
    post:
      tags: [Authorization]
      summary: Roll back central authorization policy to a target version
      operationId: rollbackAuthorizationPolicy
      description: Set the active policy version and disable rollout to enforce the target immediately.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AuthzPolicyRollbackRequest"
      responses:
        "200":
          description: Rollback result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthzPolicyRollbackResponse"
        "400":
          description: Invalid rollback request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Policy version not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "503":
          description: Policy store unavailable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /v1/organizations/current:
    parameters:
      - $ref: "#/components/parameters/scopeTenantID"
      - $ref: "#/components/parameters/scopeWorkspaceID"
    get:
      tags: [Tenancy]
      summary: Get current organization
      operationId: getCurrentOrganization
      responses:
        "200":
          description: Current organization record
          content:
            application/json:
              schema:
                type: object
                properties:
                  organization:
                    $ref: "#/components/schemas/Organization"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
    put:
      tags: [Tenancy]
      summary: Upsert current organization
      operationId: upsertCurrentOrganization
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OrganizationUpsertRequest"
      responses:
        "200":
          description: Organization upserted
          content:
            application/json:
              schema:
                type: object
                properties:
                  organization:
                    $ref: "#/components/schemas/Organization"
        "400":
          description: Invalid organization payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /v1/workspaces:
    parameters:
      - $ref: "#/components/parameters/scopeTenantID"
      - $ref: "#/components/parameters/scopeWorkspaceID"
    get:
      tags: [Tenancy]
      summary: List workspaces for current tenant
      operationId: listWorkspaces
      parameters:
        - $ref: "#/components/parameters/limit"
        - $ref: "#/components/parameters/cursor"
        - $ref: "#/components/parameters/sortBy"
        - $ref: "#/components/parameters/sortOrder"
      responses:
        "200":
          description: Workspace page
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkspacePage"
        "401":
          $ref: "#/components/responses/Unauthorized"
    post:
      tags: [Tenancy]
      summary: Create or update workspace
      operationId: upsertWorkspace
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WorkspaceUpsertRequest"
      responses:
        "200":
          description: Workspace upserted
          content:
            application/json:
              schema:
                type: object
                properties:
                  workspace:
                    $ref: "#/components/schemas/Workspace"
        "400":
          description: Invalid workspace payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /v1/whoami:
    parameters:
      - $ref: "#/components/parameters/scopeTenantID"
      - $ref: "#/components/parameters/scopeWorkspaceID"
    get:
      tags: [Tenancy]
      summary: Resolve caller identity and workspace context
      operationId: getWhoAmIContext
      responses:
        "200":
          description: Identity and workspace context
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WhoAmIResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /v1/workspaces/active:
    parameters:
      - $ref: "#/components/parameters/scopeTenantID"
      - $ref: "#/components/parameters/scopeWorkspaceID"
    post:
      tags: [Tenancy]
      summary: Validate and resolve one active workspace context
      operationId: resolveActiveWorkspace
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ActiveWorkspaceSwitchRequest"
      responses:
        "200":
          description: Active workspace resolved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ActiveWorkspaceSwitchResponse"
        "400":
          description: Invalid workspace payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          $ref: "#/components/responses/NotFound"
  /v1/workspaces/{workspace_id}:
    parameters:
      - $ref: "#/components/parameters/scopeTenantID"
      - $ref: "#/components/parameters/scopeWorkspaceID"
    get:
      tags: [Tenancy]
      summary: Get workspace
      operationId: getWorkspace
      parameters:
        - in: path
          name: workspace_id
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Workspace detail
          content:
            application/json:
              schema:
                type: object
                properties:
                  workspace:
                    $ref: "#/components/schemas/Workspace"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      tags: [Tenancy]
      summary: Delete workspace
      operationId: deleteWorkspace
      parameters:
        - in: path
          name: workspace_id
          required: true
          schema: { type: string }
      responses:
        "204":
          description: Workspace deleted
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
  /v1/workspaces/{workspace_id}/members:
    parameters:
      - $ref: "#/components/parameters/scopeTenantID"
      - $ref: "#/components/parameters/scopeWorkspaceID"
    get:
      tags: [Tenancy]
      summary: List workspace members
      operationId: listWorkspaceMembers
      parameters:
        - in: path
          name: workspace_id
          required: true
          schema: { type: string }
        - $ref: "#/components/parameters/limit"
        - $ref: "#/components/parameters/cursor"
        - in: query
          name: role
          schema:
            $ref: "#/components/schemas/WorkspaceMemberRole"
        - in: query
          name: status
          schema:
            $ref: "#/components/schemas/WorkspaceMemberStatus"
      responses:
        "200":
          description: Workspace member page
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkspaceMemberPage"
        "401":
          $ref: "#/components/responses/Unauthorized"
    post:
      tags: [Tenancy]
      summary: Create or update workspace member
      operationId: upsertWorkspaceMember
      parameters:
        - in: path
          name: workspace_id
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WorkspaceMemberUpsertRequest"
      responses:
        "200":
          description: Workspace member upserted
          content:
            application/json:
              schema:
                type: object
                properties:
                  member:
                    $ref: "#/components/schemas/WorkspaceMember"
        "400":
          description: Invalid member payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
  /v1/workspaces/{workspace_id}/members/{member_id}:
    parameters:
      - $ref: "#/components/parameters/scopeTenantID"
      - $ref: "#/components/parameters/scopeWorkspaceID"
    get:
      tags: [Tenancy]
      summary: Get workspace member
      operationId: getWorkspaceMember
      parameters:
        - in: path
          name: workspace_id
          required: true
          schema: { type: string }
        - in: path
          name: member_id
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Workspace member detail
          content:
            application/json:
              schema:
                type: object
                properties:
                  member:
                    $ref: "#/components/schemas/WorkspaceMember"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      tags: [Tenancy]
      summary: Delete workspace member
      operationId: deleteWorkspaceMember
      parameters:
        - in: path
          name: workspace_id
          required: true
          schema: { type: string }
        - in: path
          name: member_id
          required: true
          schema: { type: string }
      responses:
        "204":
          description: Member deleted
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
  /v1/workspaces/{workspace_id}/projects:
    parameters:
      - $ref: "#/components/parameters/scopeTenantID"
      - $ref: "#/components/parameters/scopeWorkspaceID"
    get:
      tags: [ProjectManagement]
      summary: List workspace projects
      operationId: listProjects
      parameters:
        - in: path
          name: workspace_id
          required: true
          schema: { type: string }
        - $ref: "#/components/parameters/limit"
        - $ref: "#/components/parameters/cursor"
        - $ref: "#/components/parameters/sortBy"
        - $ref: "#/components/parameters/sortOrder"
        - in: query
          name: include_archived
          schema:
            type: boolean
            default: false
      responses:
        "200":
          description: Project page
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectPage"
        "401":
          $ref: "#/components/responses/Unauthorized"
    post:
      tags: [ProjectManagement]
      summary: Create or update workspace project
      operationId: upsertProject
      parameters:
        - in: path
          name: workspace_id
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProjectUpsertRequest"
      responses:
        "200":
          description: Project upserted
          content:
            application/json:
              schema:
                type: object
                properties:
                  project:
                    $ref: "#/components/schemas/Project"
        "400":
          description: Invalid project payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
  /v1/workspaces/{workspace_id}/projects/{project_id}:
    parameters:
      - $ref: "#/components/parameters/scopeTenantID"
      - $ref: "#/components/parameters/scopeWorkspaceID"
    get:
      tags: [ProjectManagement]
      summary: Get workspace project
      operationId: getProject
      parameters:
        - in: path
          name: workspace_id
          required: true
          schema: { type: string }
        - in: path
          name: project_id
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Project detail
          content:
            application/json:
              schema:
                type: object
                properties:
                  project:
                    $ref: "#/components/schemas/Project"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      tags: [ProjectManagement]
      summary: Delete workspace project
      operationId: deleteProject
      parameters:
        - in: path
          name: workspace_id
          required: true
          schema: { type: string }
        - in: path
          name: project_id
          required: true
          schema: { type: string }
      responses:
        "204":
          description: Project deleted
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
  /v1/workspaces/{workspace_id}/projects/{project_id}/kubernetes/connection:
    parameters:
      - $ref: "#/components/parameters/scopeTenantID"
      - $ref: "#/components/parameters/scopeWorkspaceID"
    get:
      tags: [ProjectManagement]
      summary: Get Kubernetes project connection status
      operationId: getKubernetesProjectConnection
      parameters:
        - in: path
          name: workspace_id
          required: true
          schema: { type: string }
        - in: path
          name: project_id
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Kubernetes connection status
          content:
            application/json:
              schema:
                type: object
                properties:
                  connection:
                    $ref: "#/components/schemas/KubernetesConnectionStatus"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
    post:
      tags: [ProjectManagement]
      summary: Validate and save Kubernetes project connection
      operationId: upsertKubernetesProjectConnection
      description: Runs non-mutating kubectl preflight checks for cluster identity and scanner-critical RBAC read access before marking a connector active.
      parameters:
        - in: path
          name: workspace_id
          required: true
          schema: { type: string }
        - in: path
          name: project_id
          required: true
          schema: { type: string }
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/KubernetesConnectionUpsertRequest"
      responses:
        "200":
          description: Kubernetes preflight result
          content:
            application/json:
              schema:
                type: object
                properties:
                  connection:
                    $ref: "#/components/schemas/KubernetesConnectionStatus"
        "400":
          description: Invalid Kubernetes connection request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "503":
          description: Kubernetes preflight unavailable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /v1/workspaces/{workspace_id}/projects/{project_id}/aws/connection:
    parameters:
      - $ref: "#/components/parameters/scopeTenantID"
      - $ref: "#/components/parameters/scopeWorkspaceID"
    get:
      tags: [ProjectManagement]
      summary: Get AWS project connection status
      operationId: getAWSProjectConnection
      parameters:
        - in: path
          name: workspace_id
          required: true
          schema: { type: string }
        - in: path
          name: project_id
          required: true
          schema: { type: string }
      responses:
        "200":
          description: AWS connection status
          content:
            application/json:
              schema:
                type: object
                properties:
                  connection:
                    $ref: "#/components/schemas/AWSConnectionStatus"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
    post:
      tags: [ProjectManagement]
      summary: Validate and save AWS project connection
      operationId: upsertAWSProjectConnection
      description: Assumes the supplied read-only AWS role, checks scanner-critical IAM read permission, and returns diagnosable connector state.
      parameters:
        - in: path
          name: workspace_id
          required: true
          schema: { type: string }
        - in: path
          name: project_id
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AWSConnectionUpsertRequest"
      responses:
        "200":
          description: AWS connection validation result
          content:
            application/json:
              schema:
                type: object
                properties:
                  connection:
                    $ref: "#/components/schemas/AWSConnectionStatus"
        "400":
          description: Invalid AWS connection request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "503":
          description: AWS connection validator unavailable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /v1/workspaces/{workspace_id}/projects/{project_id}/github/connect/start:
    parameters:
      - $ref: "#/components/parameters/scopeTenantID"
      - $ref: "#/components/parameters/scopeWorkspaceID"
    post:
      tags: [ProjectManagement]
      summary: Start GitHub project connection flow
      operationId: startGitHubProjectConnection
      parameters:
        - in: path
          name: workspace_id
          required: true
          schema: { type: string }
        - in: path
          name: project_id
          required: true
          schema: { type: string }
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GitHubConnectionStartRequest"
      responses:
        "200":
          description: GitHub connection bootstrap generated
          content:
            application/json:
              schema:
                type: object
                properties:
                  connection:
                    $ref: "#/components/schemas/GitHubConnectionStartResponse"
        "400":
          description: Invalid request payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
  /v1/workspaces/{workspace_id}/projects/{project_id}/github/connect/complete:
    parameters:
      - $ref: "#/components/parameters/scopeTenantID"
      - $ref: "#/components/parameters/scopeWorkspaceID"
    post:
      tags: [ProjectManagement]
      summary: Complete GitHub project connection
      operationId: completeGitHubProjectConnection
      parameters:
        - in: path
          name: workspace_id
          required: true
          schema: { type: string }
        - in: path
          name: project_id
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GitHubConnectionCompleteRequest"
      responses:
        "200":
          description: GitHub connection active
          content:
            application/json:
              schema:
                type: object
                properties:
                  connection:
                    $ref: "#/components/schemas/GitHubConnectionStatus"
        "400":
          description: Invalid connection request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
  /v1/workspaces/{workspace_id}/projects/{project_id}/github/connection:
    parameters:
      - $ref: "#/components/parameters/scopeTenantID"
      - $ref: "#/components/parameters/scopeWorkspaceID"
    get:
      tags: [ProjectManagement]
      summary: Get GitHub project connection status
      operationId: getGitHubProjectConnection
      parameters:
        - in: path
          name: workspace_id
          required: true
          schema: { type: string }
        - in: path
          name: project_id
          required: true
          schema: { type: string }
      responses:
        "200":
          description: GitHub connection status
          content:
            application/json:
              schema:
                type: object
                properties:
                  connection:
                    $ref: "#/components/schemas/GitHubConnectionStatus"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
  /v1/workspaces/{workspace_id}/projects/{project_id}/github/repositories:
    parameters:
      - $ref: "#/components/parameters/scopeTenantID"
      - $ref: "#/components/parameters/scopeWorkspaceID"
    put:
      tags: [ProjectManagement]
      summary: Update selected GitHub repositories for one project
      operationId: updateGitHubProjectRepositories
      parameters:
        - in: path
          name: workspace_id
          required: true
          schema: { type: string }
        - in: path
          name: project_id
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GitHubConnectionRepositorySelectionRequest"
      responses:
        "200":
          description: Updated GitHub connection
          content:
            application/json:
              schema:
                type: object
