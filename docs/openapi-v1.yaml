openapi: 3.0.3
info:
  title: Identrail API
  version: "1.0.0"
  description: |
    V1 machine identity security API for AWS and Kubernetes discovery, graphing, and findings.
servers:
  - url: http://localhost:8080
    description: Local development
tags:
  - name: Health
  - name: Authorization
  - name: Findings
  - name: Scans
  - name: Explorer
  - name: RepositoryExposure
security:
  - ApiKeyAuth: []
  - BearerAuth: []
paths:
  /healthz:
    get:
      tags: [Health]
      summary: Health check
      operationId: healthCheck
      security: []
      responses:
        "200":
          description: Service health
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                  service:
                    type: string
  /v1/authz/policies/simulate:
    parameters:
      - $ref: "#/components/parameters/scopeTenantID"
      - $ref: "#/components/parameters/scopeWorkspaceID"
    post:
      tags: [Authorization]
      summary: Simulate authorization policy decision
      operationId: simulateAuthorizationPolicy
      description: Evaluate one authorization decision with stage-by-stage trace output.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AuthzPolicySimulationRequest"
      responses:
        "200":
          description: Simulated policy decision and trace
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthzPolicySimulationResponse"
        "400":
          description: Invalid simulation request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Policy version not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Failed to simulate policy decision
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /v1/authz/policies/rollback:
    parameters:
      - $ref: "#/components/parameters/scopeTenantID"
      - $ref: "#/components/parameters/scopeWorkspaceID"
    post:
      tags: [Authorization]
      summary: Roll back central authorization policy to a target version
      operationId: rollbackAuthorizationPolicy
      description: Set the active policy version and disable rollout to enforce the target immediately.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AuthzPolicyRollbackRequest"
      responses:
        "200":
          description: Rollback result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthzPolicyRollbackResponse"
        "400":
          description: Invalid rollback request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Policy version not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "503":
          description: Policy store unavailable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /v1/findings:
    parameters:
      - $ref: "#/components/parameters/scopeTenantID"
      - $ref: "#/components/parameters/scopeWorkspaceID"
    get:
      tags: [Findings]
      summary: List findings
      operationId: listFindings
      parameters:
        - $ref: "#/components/parameters/limit"
        - $ref: "#/components/parameters/cursor"
        - $ref: "#/components/parameters/sortBy"
        - $ref: "#/components/parameters/sortOrder"
        - in: query
          name: scan_id
          schema: { type: string }
        - in: query
          name: severity
          schema:
            $ref: "#/components/schemas/FindingSeverity"
        - in: query
          name: type
          schema:
            $ref: "#/components/schemas/FindingType"
        - in: query
          name: lifecycle_status
          schema:
            $ref: "#/components/schemas/FindingLifecycleStatus"
        - in: query
          name: assignee
          schema: { type: string }
      responses:
        "200":
          description: Findings page
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FindingPage"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /v1/findings/summary:
    parameters:
      - $ref: "#/components/parameters/scopeTenantID"
      - $ref: "#/components/parameters/scopeWorkspaceID"
    get:
      tags: [Findings]
      summary: Findings summary
      operationId: getFindingsSummary
      parameters:
        - $ref: "#/components/parameters/limit"
      responses:
        "200":
          description: Findings summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FindingsSummary"
  /v1/findings/trends:
    parameters:
      - $ref: "#/components/parameters/scopeTenantID"
      - $ref: "#/components/parameters/scopeWorkspaceID"
    get:
      tags: [Findings]
      summary: Findings trend over recent scans
      operationId: getFindingsTrends
      parameters:
        - in: query
          name: points
          schema:
            type: integer
            minimum: 1
        - in: query
          name: severity
          schema:
            $ref: "#/components/schemas/FindingSeverity"
        - in: query
          name: type
          schema:
            $ref: "#/components/schemas/FindingType"
      responses:
        "200":
          description: Trend points
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: "#/components/schemas/TrendPoint"
  /v1/findings/{finding_id}:
    parameters:
      - $ref: "#/components/parameters/scopeTenantID"
      - $ref: "#/components/parameters/scopeWorkspaceID"
    get:
      tags: [Findings]
      summary: Get finding by id
      operationId: getFinding
      parameters:
        - in: path
          name: finding_id
          required: true
          schema: { type: string }
        - in: query
          name: scan_id
          schema: { type: string }
      responses:
        "200":
          description: Finding detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Finding"
        "404":
          $ref: "#/components/responses/NotFound"
  /v1/findings/{finding_id}/history:
    parameters:
      - $ref: "#/components/parameters/scopeTenantID"
      - $ref: "#/components/parameters/scopeWorkspaceID"
    get:
      tags: [Findings]
      summary: List finding triage history
      operationId: listFindingHistory
      parameters:
        - in: path
          name: finding_id
          required: true
          schema: { type: string }
        - in: query
          name: scan_id
          schema: { type: string }
        - $ref: "#/components/parameters/limit"
      responses:
        "200":
          description: Triage history
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: "#/components/schemas/FindingTriageEvent"
        "404":
          $ref: "#/components/responses/NotFound"
  /v1/findings/{finding_id}/triage:
    parameters:
      - $ref: "#/components/parameters/scopeTenantID"
      - $ref: "#/components/parameters/scopeWorkspaceID"
    patch:
      tags: [Findings]
      summary: Update finding triage workflow metadata
      operationId: triageFinding
      parameters:
        - in: path
          name: finding_id
          required: true
          schema: { type: string }
        - in: query
          name: scan_id
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FindingTriageRequest"
      responses:
        "200":
          description: Updated finding
          content:
            application/json:
              schema:
                type: object
                properties:
                  finding:
                    $ref: "#/components/schemas/Finding"
        "400":
          description: Invalid triage request
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          description: Forbidden
        "404":
          $ref: "#/components/responses/NotFound"
  /v1/findings/{finding_id}/exports:
    parameters:
      - $ref: "#/components/parameters/scopeTenantID"
      - $ref: "#/components/parameters/scopeWorkspaceID"
    get:
      tags: [Findings]
      summary: Get standards-aligned exports for a finding
      operationId: getFindingExports
      parameters:
        - in: path
          name: finding_id
          required: true
          schema: { type: string }
        - in: query
          name: scan_id
          schema: { type: string }
      responses:
        "200":
          description: OCSF and ASFF payloads
          content:
            application/json:
              schema:
                type: object
                properties:
                  ocsf:
                    type: object
                    additionalProperties: true
                  asff:
                    type: object
                    additionalProperties: true
  /v1/scans:
    parameters:
      - $ref: "#/components/parameters/scopeTenantID"
      - $ref: "#/components/parameters/scopeWorkspaceID"
    get:
      tags: [Scans]
      summary: List scans
      operationId: listScans
      parameters:
        - $ref: "#/components/parameters/limit"
        - $ref: "#/components/parameters/cursor"
        - $ref: "#/components/parameters/sortBy"
        - $ref: "#/components/parameters/sortOrder"
      responses:
        "200":
          description: Scans page
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScanPage"
    post:
      tags: [Scans]
      summary: Trigger scan
      operationId: runScan
      responses:
        "202":
          description: Scan enqueued
          content:
            application/json:
              schema:
                type: object
                properties:
                  scan:
                    $ref: "#/components/schemas/ScanRecord"
        "429":
          description: Scan queue is full
  /v1/scans/{scan_id}/diff:
    parameters:
      - $ref: "#/components/parameters/scopeTenantID"
      - $ref: "#/components/parameters/scopeWorkspaceID"
    get:
      tags: [Scans]
      summary: Compare a scan with baseline
      operationId: getScanDiff
      parameters:
        - in: path
          name: scan_id
          required: true
          schema: { type: string }
        - $ref: "#/components/parameters/limit"
        - in: query
          name: previous_scan_id
          schema: { type: string }
      responses:
        "200":
          description: Scan diff
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScanDiff"
        "400":
          description: Invalid baseline
  /v1/scans/{scan_id}/events:
    parameters:
      - $ref: "#/components/parameters/scopeTenantID"
      - $ref: "#/components/parameters/scopeWorkspaceID"
    get:
      tags: [Scans]
      summary: List scan lifecycle events
      operationId: listScanEvents
      parameters:
        - in: path
          name: scan_id
          required: true
          schema: { type: string }
        - $ref: "#/components/parameters/limit"
        - $ref: "#/components/parameters/cursor"
        - $ref: "#/components/parameters/sortBy"
        - $ref: "#/components/parameters/sortOrder"
        - in: query
          name: level
          schema:
            type: string
            enum: [debug, info, warn, error]
      responses:
        "200":
          description: Events page
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScanEventPage"
  /v1/identities:
    parameters:
      - $ref: "#/components/parameters/scopeTenantID"
      - $ref: "#/components/parameters/scopeWorkspaceID"
    get:
      tags: [Explorer]
      summary: List normalized identities
      operationId: listIdentities
      parameters:
        - $ref: "#/components/parameters/limit"
        - $ref: "#/components/parameters/cursor"
        - $ref: "#/components/parameters/sortBy"
        - $ref: "#/components/parameters/sortOrder"
        - in: query
          name: scan_id
          schema: { type: string }
        - in: query
          name: provider
          schema:
            type: string
            enum: [aws, kubernetes]
        - in: query
          name: type
          schema: { type: string }
        - in: query
          name: name_prefix
          schema: { type: string }
      responses:
        "200":
          description: Identities page
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IdentityPage"
  /v1/relationships:
    parameters:
      - $ref: "#/components/parameters/scopeTenantID"
      - $ref: "#/components/parameters/scopeWorkspaceID"
    get:
      tags: [Explorer]
      summary: List graph relationships
      operationId: listRelationships
      parameters:
        - $ref: "#/components/parameters/limit"
        - $ref: "#/components/parameters/cursor"
        - $ref: "#/components/parameters/sortBy"
        - $ref: "#/components/parameters/sortOrder"
        - in: query
          name: scan_id
          schema: { type: string }
        - in: query
          name: type
          schema: { type: string }
        - in: query
          name: from_node_id
          schema: { type: string }
        - in: query
          name: to_node_id
          schema: { type: string }
      responses:
        "200":
          description: Relationships page
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RelationshipPage"
  /v1/ownership/signals:
    parameters:
      - $ref: "#/components/parameters/scopeTenantID"
      - $ref: "#/components/parameters/scopeWorkspaceID"
    get:
      tags: [Explorer]
      summary: List ownership signals
      operationId: listOwnershipSignals
      parameters:
        - $ref: "#/components/parameters/limit"
        - $ref: "#/components/parameters/cursor"
        - $ref: "#/components/parameters/sortBy"
        - $ref: "#/components/parameters/sortOrder"
        - in: query
          name: scan_id
          schema: { type: string }
      responses:
        "200":
          description: Ownership signal page
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OwnershipSignalPage"
  /v1/repo-scans:
    parameters:
      - $ref: "#/components/parameters/scopeTenantID"
      - $ref: "#/components/parameters/scopeWorkspaceID"
    get:
      tags: [RepositoryExposure]
      summary: List repository exposure scans
      operationId: listRepoScans
      parameters:
        - $ref: "#/components/parameters/limit"
        - $ref: "#/components/parameters/cursor"
        - $ref: "#/components/parameters/sortBy"
        - $ref: "#/components/parameters/sortOrder"
      responses:
        "200":
          description: Repo scan page
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RepoScanPage"
    post:
      tags: [RepositoryExposure]
      summary: Trigger repository exposure scan
      operationId: runRepoScan
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RepoScanRequest"
      responses:
        "202":
          description: Repo scan enqueued
          content:
            application/json:
              schema:
                type: object
                properties:
                  repo_scan:
                    $ref: "#/components/schemas/RepoScanRecord"
        "400":
          description: Invalid repository scan request
        "403":
          description: Repo target not allowed
        "409":
          description: Repo scan already in progress for target
        "429":
          description: Repo scan queue is full
        "503":
          description: Repo scan is disabled
  /v1/repo-scans/{repo_scan_id}:
    parameters:
      - $ref: "#/components/parameters/scopeTenantID"
      - $ref: "#/components/parameters/scopeWorkspaceID"
    get:
      tags: [RepositoryExposure]
      summary: Get repository scan
      operationId: getRepoScan
      parameters:
        - in: path
          name: repo_scan_id
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Repository scan detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RepoScanRecord"
        "404":
          $ref: "#/components/responses/NotFound"
  /v1/repo-findings:
    parameters:
      - $ref: "#/components/parameters/scopeTenantID"
      - $ref: "#/components/parameters/scopeWorkspaceID"
    get:
      tags: [RepositoryExposure]
      summary: List repository scan findings
      operationId: listRepoFindings
      parameters:
        - $ref: "#/components/parameters/limit"
        - $ref: "#/components/parameters/cursor"
        - $ref: "#/components/parameters/sortBy"
        - $ref: "#/components/parameters/sortOrder"
        - in: query
          name: repo_scan_id
          schema: { type: string }
        - in: query
          name: severity
          schema:
            $ref: "#/components/schemas/FindingSeverity"
        - in: query
          name: type
          schema:
            $ref: "#/components/schemas/FindingType"
      responses:
        "200":
          description: Repository findings page
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FindingPage"
components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    scopeTenantID:
      in: header
      name: X-Identrail-Tenant-ID
      required: false
      schema:
        type: string
      description: Optional tenant scope override when token claims do not provide tenant context.
    scopeWorkspaceID:
      in: header
      name: X-Identrail-Workspace-ID
      required: false
      schema:
        type: string
      description: Optional workspace scope override when token claims do not provide workspace context.
    limit:
      in: query
      name: limit
      schema:
        type: integer
        minimum: 1
    cursor:
      in: query
      name: cursor
      schema:
        type: integer
        minimum: 0
    sortBy:
      in: query
      name: sort_by
      schema:
        type: string
      description: Endpoint-specific sort field.
    sortOrder:
      in: query
      name: sort_order
      schema:
        type: string
        enum: [asc, desc]
      description: Sort direction.
  responses:
    Unauthorized:
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    NotFound:
      description: Not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
  schemas:
    ErrorResponse:
      type: object
      properties:
        error:
          type: string
    PolicyStage:
      type: string
      enum: [tenant_isolation, rbac, abac, rebac, default_deny]
    PolicyOutcome:
      type: string
      enum: [no_op, allow, deny, skipped]
    PolicyDecision:
      type: object
      properties:
        allowed:
          type: boolean
        stage:
          $ref: "#/components/schemas/PolicyStage"
        reason:
          type: string
    PolicyTraceStep:
      type: object
      properties:
        stage:
          $ref: "#/components/schemas/PolicyStage"
        outcome:
          $ref: "#/components/schemas/PolicyOutcome"
        reason:
          type: string
    PolicySimulationSubjectInput:
      type: object
      properties:
        type:
          type: string
        id:
          type: string
        tenant_id:
          type: string
        workspace_id:
          type: string
        groups:
          type: array
          items:
            type: string
        roles:
          type: array
          items:
            type: string
        attributes:
          type: object
          additionalProperties:
            type: string
    PolicySimulationResourceInput:
      type: object
      properties:
        type:
          type: string
        id:
          type: string
        tenant_id:
          type: string
        workspace_id:
          type: string
        attributes:
          type: object
          additionalProperties:
            type: string
    PolicySimulationContextInput:
      type: object
      properties:
        request_path:
          type: string
        request_method:
          type: string
        attributes:
          type: object
          additionalProperties:
            type: string
    AuthzPolicySimulationRequest:
      type: object
      required: [subject, action, resource, context]
      properties:
        subject:
          $ref: "#/components/schemas/PolicySimulationSubjectInput"
        action:
          type: string
        resource:
          $ref: "#/components/schemas/PolicySimulationResourceInput"
        context:
          $ref: "#/components/schemas/PolicySimulationContextInput"
        policy_set_id:
          type: string
        target_version:
          type: integer
          minimum: 1
          nullable: true
        audit_event:
          type: boolean
    AuthzPolicySimulationPolicyResponse:
      type: object
      properties:
        source:
          type: string
        policy_set_id:
          type: string
        version:
          type: integer
        rollout_mode:
          type: string
        target_version:
          type: integer
          nullable: true
    AuthzPolicySimulationResponse:
      type: object
      properties:
        decision:
          $ref: "#/components/schemas/PolicyDecision"
        trace:
          type: array
          items:
            $ref: "#/components/schemas/PolicyTraceStep"
        policy:
          $ref: "#/components/schemas/AuthzPolicySimulationPolicyResponse"
    AuthzPolicyRollbackRequest:
      type: object
      required: [target_version]
      properties:
        policy_set_id:
          type: string
        target_version:
          type: integer
          minimum: 1
        actor:
          type: string
    AuthzPolicyRollbackResponse:
      type: object
      properties:
        policy_set_id:
          type: string
        previous_effective_version:
          type: integer
          nullable: true
        previous_active_version:
          type: integer
          nullable: true
        previous_candidate_version:
          type: integer
          nullable: true
        active_version:
          type: integer
        rollout_mode:
          type: string
        updated_at:
          type: string
          format: date-time
    FindingSeverity:
      type: string
      enum: [critical, high, medium, low, info]
    FindingType:
      type: string
      enum:
        - overprivileged_identity
        - escalation_path
        - stale_identity
        - ownerless_identity
        - risky_trust_policy
        - secret_exposure
        - repo_misconfiguration
    FindingLifecycleStatus:
      type: string
      enum: [open, ack, suppressed, resolved]
    FindingTriage:
      type: object
      properties:
        status:
          $ref: "#/components/schemas/FindingLifecycleStatus"
        assignee:
          type: string
        suppression_expires_at:
          type: string
          format: date-time
          nullable: true
        updated_at:
          type: string
          format: date-time
          nullable: true
        updated_by:
          type: string
    FindingTriageRequest:
      type: object
      properties:
        status:
          $ref: "#/components/schemas/FindingLifecycleStatus"
        assignee:
          type: string
        suppression_expires_at:
          type: string
          format: date-time
          nullable: true
        comment:
          type: string
    FindingTriageEvent:
      type: object
      properties:
        id: { type: string }
        finding_id: { type: string }
        action: { type: string }
        from_status:
          $ref: "#/components/schemas/FindingLifecycleStatus"
        to_status:
          $ref: "#/components/schemas/FindingLifecycleStatus"
        assignee: { type: string }
        suppression_expires_at:
          type: string
          format: date-time
          nullable: true
        comment: { type: string }
        actor: { type: string }
        created_at:
          type: string
          format: date-time
    Finding:
      type: object
      properties:
        id: { type: string }
        scan_id: { type: string }
        type: { $ref: "#/components/schemas/FindingType" }
        severity: { $ref: "#/components/schemas/FindingSeverity" }
        title: { type: string }
        human_summary: { type: string }
        path:
          type: array
          items: { type: string }
        evidence:
          type: object
          additionalProperties: true
        remediation: { type: string }
        created_at:
          type: string
          format: date-time
        triage:
          $ref: "#/components/schemas/FindingTriage"
    FindingsSummary:
      type: object
      properties:
        total:
          type: integer
        by_severity:
          type: object
          additionalProperties:
            type: integer
        by_type:
          type: object
          additionalProperties:
            type: integer
    ScanRecord:
      type: object
      properties:
        id: { type: string }
        provider: { type: string }
        status: { type: string }
        started_at:
          type: string
          format: date-time
        finished_at:
          type: string
          format: date-time
          nullable: true
        asset_count: { type: integer }
        finding_count: { type: integer }
        error_message: { type: string }
    ScanEvent:
      type: object
      properties:
        id: { type: string }
        scan_id: { type: string }
