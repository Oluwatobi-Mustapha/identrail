components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    CookieAuth:
      type: apiKey
      in: cookie
      name: identrail_session
    GitHubWebhookSignature:
      type: apiKey
      in: header
      name: X-Hub-Signature-256
      description: GitHub HMAC SHA-256 signature of the raw webhook request body.
    WorkOSWebhookSignature:
      type: apiKey
      in: header
      name: WorkOS-Signature
      description: WorkOS HMAC SHA-256 signature of the raw webhook request body.
  parameters:
    scopeTenantID:
      in: header
      name: X-Identrail-Tenant-ID
      required: false
      schema:
        type: string
      description: Optional tenant scope override when token claims do not provide tenant context. API key callers must use a key bound to the same tenant scope.
    scopeWorkspaceID:
      in: header
      name: X-Identrail-Workspace-ID
      required: false
      schema:
        type: string
      description: Optional workspace scope override when token claims do not provide workspace context. API key callers must use a key bound to the same workspace scope.
    limit:
      in: query
      name: limit
      schema:
        type: integer
        minimum: 1
    cursor:
      in: query
      name: cursor
      schema:
        type: integer
        minimum: 0
    sortBy:
      in: query
      name: sort_by
      schema:
        type: string
      description: Endpoint-specific sort field.
    sortOrder:
      in: query
      name: sort_order
      schema:
        type: string
        enum: [asc, desc]
      description: Sort direction.
    githubInstallationID:
      in: header
      name: X-GitHub-Installation-ID
      required: false
      schema:
        type: integer
        format: int64
        minimum: 1
      description: Optional installation ID fallback when the completion request body omits `installation_id`.
  responses:
    BadRequest:
      description: Bad request
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Conflict:
      description: Conflict
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Forbidden:
      description: Forbidden
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    InternalServerError:
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Unauthorized:
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    NotFound:
      description: Not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    NotImplemented:
      description: Not implemented
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    ServiceUnavailable:
      description: Service unavailable
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    TooManyRequests:
      description: Too many requests
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
  schemas:
    ServiceStatusResponse:
      type: object
      required: [status, service]
      properties:
        status:
          type: string
        service:
          type: string
    ErrorResponse:
      type: object
      properties:
        error:
          type: string
    CreateInvitationRequest:
      type: object
      properties:
        email:
          type: string
          format: email
        role:
          type: string
          enum: [owner, admin, analyst, viewer]
    CreateVerifiedDomainRequest:
      type: object
      properties:
        domain:
          type: string
        verification_method:
          type: string
          enum: [dns_txt, manual]
    Invitation:
      type: object
      properties:
        id: { type: string, format: uuid }
        org_id: { type: string }
        email: { type: string, format: email }
        role:
          type: string
          enum: [owner, admin, analyst, viewer]
        invited_by_user_id:
          type: string
          format: uuid
        expires_at:
          type: string
          format: date-time
        accepted_at:
          type: string
          format: date-time
        revoked_at:
          type: string
          format: date-time
        created_at:
          type: string
          format: date-time
    VerifiedDomain:
