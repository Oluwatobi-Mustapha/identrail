paths:
  /healthz:
    get:
      tags: [Health]
      summary: Health check
      operationId: healthCheck
      security: []
      responses:
        "200":
          description: Service health
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ServiceStatusResponse"
  /readyz:
    get:
      tags: [Health]
      summary: Readiness check
      operationId: readinessCheck
      security: []
      responses:
        "200":
          description: Service ready
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ServiceStatusResponse"
        "503":
          description: Service not ready
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ServiceStatusResponse"
  /metrics:
    get:
      tags: [Health]
      summary: Prometheus metrics endpoint
      operationId: metrics
      security:
        - ApiKeyAuth: []
        - BearerAuth: []
      responses:
        "200":
          description: Prometheus text exposition format
          content:
            text/plain:
              schema:
                type: string
  /auth/logout:
    post:
      tags: [Authorization]
      summary: Log out the current session
      operationId: logoutCurrentSession
      security:
        - CookieAuth: []
      responses:
        "200":
          description: Current session revoked and cookie cleared
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
        "401":
          $ref: "#/components/responses/Unauthorized"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"
  /auth/login:
    get:
      tags: [Authorization]
      summary: Start WorkOS AuthKit sign-in
      operationId: startWorkOSLogin
      security: []
      parameters:
        - in: query
          name: return_to
          required: false
          schema:
            type: string
        - in: query
          name: provider
          required: false
          description: Optional hosted provider selector. Defaults to AuthKit when omitted.
          schema:
            type: string
            enum: [authkit, google_oauth, github_oauth]
      responses:
        "302":
          description: Redirect to WorkOS AuthKit
        "503":
          $ref: "#/components/responses/ServiceUnavailable"
  /auth/signup:
    get:
      tags: [Authorization]
      summary: Start WorkOS AuthKit sign-up
      operationId: startWorkOSSignup
      security: []
      parameters:
        - in: query
          name: return_to
          required: false
          schema:
            type: string
        - in: query
          name: provider
          required: false
          description: Optional hosted provider selector. Defaults to AuthKit when omitted.
          schema:
            type: string
            enum: [authkit, google_oauth, github_oauth]
      responses:
        "302":
          description: Redirect to WorkOS AuthKit sign-up screen
        "503":
          $ref: "#/components/responses/ServiceUnavailable"
  /auth/manual:
    post:
      tags: [Authorization]
      summary: Create a dev/self-host manual session
      operationId: createManualAuthSession
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [tenant_id, workspace_id]
              properties:
                tenant_id:
                  type: string
                workspace_id:
                  type: string
                project_id:
                  type: string
                email:
                  type: string
                  format: email
                display_name:
                  type: string
      responses:
        "200":
          description: Session cookie set for manual mode
          content:
            application/json:
              schema:
                type: object
                required: [ok, redirect_to]
                properties:
                  ok:
                    type: boolean
                  redirect_to:
                    type: string
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          description: Manual mode is disabled for this deployment
        "409":
          $ref: "#/components/responses/Conflict"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"
  /auth/callback:
    get:
      tags: [Authorization]
      summary: Complete WorkOS AuthKit callback
      operationId: completeWorkOSCallback
      security: []
      parameters:
        - in: query
          name: code
          required: true
          schema:
            type: string
        - in: query
          name: state
          required: true
          schema:
            type: string
      responses:
        "302":
          description: Session cookie set and browser redirected to the app
        "400":
          $ref: "#/components/responses/BadRequest"
        "409":
          $ref: "#/components/responses/Conflict"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"
  /auth/saml/login/{connection_id}:
    get:
      tags: [Authorization]
      summary: Begin native SAML SP-initiated login
      operationId: beginNativeSAMLLogin
      security: []
      parameters:
        - in: path
          name: connection_id
          required: true
          schema:
            type: string
            format: uuid
        - in: query
          name: return_to
          schema:
            type: string
      responses:
        "302":
          description: Browser redirected to the IdP SSO URL with RelayState
        "404":
          $ref: "#/components/responses/NotFound"
        "403":
          $ref: "#/components/responses/Forbidden"
        "500":
          $ref: "#/components/responses/InternalServerError"
  /auth/saml/acs/{connection_id}:
    post:
      tags: [Authorization]
      summary: Receive a SAML 2.0 assertion at the Assertion Consumer Service
      operationId: receiveNativeSAMLAssertion
      security: []
      parameters:
        - in: path
          name: connection_id
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required: [SAMLResponse]
              properties:
                SAMLResponse:
                  type: string
                  description: Base64-encoded SAML 2.0 Response document
                RelayState:
                  type: string
                  description: Opaque state token issued by /auth/saml/login
      responses:
        "302":
          description: Session cookie set and browser redirected to the app
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"
  /auth/webhooks/workos:
    post:
      tags: [Authorization]
      summary: Receive WorkOS AuthKit lifecycle webhooks
      operationId: receiveWorkOSWebhook
      security:
        - WorkOSWebhookSignature: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        "200":
          description: Webhook accepted
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "409":
          $ref: "#/components/responses/Conflict"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"
  /webhooks/github:
    post:
      tags: [RepositoryExposure]
      summary: Receive GitHub webhook events for repository scan triggers
      operationId: receiveGitHubWebhook
      security:
        - GitHubWebhookSignature: []
      parameters:
        - in: header
          name: X-GitHub-Event
          required: true
          schema: { type: string }
        - in: header
          name: X-GitHub-Delivery
          required: false
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        "202":
          description: Webhook accepted
          content:
            application/json:
              schema:
                type: object
                properties:
                  webhook:
                    $ref: "#/components/schemas/GitHubWebhookResult"
        "400":
          description: Invalid webhook payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Invalid webhook signature
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /v1/authz/policies/simulate:
    parameters:
      - $ref: "#/components/parameters/scopeTenantID"
      - $ref: "#/components/parameters/scopeWorkspaceID"
    post:
      tags: [Authorization]
      summary: Simulate authorization policy decision
      operationId: simulateAuthorizationPolicy
      description: Evaluate one authorization decision with stage-by-stage trace output.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AuthzPolicySimulationRequest"
      responses:
        "200":
          description: Simulated policy decision and trace
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthzPolicySimulationResponse"
        "400":
          description: Invalid simulation request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Policy version not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Failed to simulate policy decision
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /v1/authz/policies/rollback:
    parameters:
      - $ref: "#/components/parameters/scopeTenantID"
      - $ref: "#/components/parameters/scopeWorkspaceID"
    post:
      tags: [Authorization]
      summary: Roll back central authorization policy to a target version
